<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧文件校正掃描器 Pro v5.5</title>
    
    <style>
        body { background-color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        /* 移除 PADDING，空間完整還給照片 */
        .canvas-container { position: relative; display: inline-block; margin: 0 auto; padding: 0px; overflow: visible; }
        #editor-canvas { display: block; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 20px 20px; border-radius: 4px; }
        /* 同步調整 Overlay 位置 */
        #overlay-canvas { position: absolute; top: 0px; left: 0px; pointer-events: none; }
        .corner-handle { position: absolute; width: 28px; height: 28px; background-color: rgba(59, 130, 246, 0.95); border: 3px solid white; border-radius: 50%; transform: translate(-50%, -50%); cursor: grab; box-shadow: 0 4px 8px rgba(0,0,0,0.3); z-index: 10; transition: background-color 0.2s, transform 0.1s; }
        .corner-handle:active { cursor: grabbing; background-color: #1d4ed8; transform: translate(-50%, -50%) scale(1.15); }
        input[type="file"] { display: none; }
        
        /* 拖曳視覺回饋 */
        .drag-over { background-color: #dbeafe !important; border: 2px dashed #2563eb !important; }

        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 100; }
        .toast { background: #1f2937; color: white; padding: 14px 28px; border-radius: 99px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); display: flex; align-items: center; gap: 12px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .toast-success { background: #059669; }
        
        /* 滿版圖片檢視器動畫 */
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.2s ease-out; }
        .modal-exit { opacity: 1; transform: scale(1); }
        .modal-exit-active { opacity: 0; transform: scale(0.95); transition: all 0.2s ease-in; }

        /* --- 列印專用樣式修正 --- */
        #print-area { display: none; } /* 螢幕顯示時絕對不顯示此區域，徹底解決底部殘留問題 */
        @media print {
            body > *:not(#print-area) { display: none !important; }
            #print-area { display: flex !important; position: absolute; left: 0; top: 0; width: 100%; justify-content: center; margin: 0; padding: 0; background: white; }
            #print-area img { max-width: 100%; height: auto; object-fit: contain; }
        }
    </style>

<body class="text-gray-800 p-4 md:p-8">
    <!-- 修復 2: 移除 max-w-6xl 並改用 w-full 與大螢幕寬邊距，讓大寬度螢幕盡可能滿版顯示 -->
    <div class="w-full px-2 md:px-6 lg:px-12 mx-auto space-y-6">
        
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">📄 智慧文件校正掃描器 Pro v5.5</h1>

        <!-- 懸浮通知容器 -->
        <div id="toast-container">

        <div class="bg-white p-6 rounded-xl shadow-md grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
            <div class="space-y-4">
                <h2 class="text-lg font-semibold border-b pb-2">1. 檔案與方向控制</h2>
                <div class="flex flex-wrap gap-3 items-center">
                    <label class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg cursor-pointer transition font-medium shadow-sm flex items-center">
                        上傳照片
                        <input type="file" id="image-upload" accept="image/*">
                    </label>
                </div>
                
                <div class="flex flex-wrap gap-3">
                    <button id="btn-rotate-90" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg transition text-sm font-medium border border-gray-300 disabled:opacity-50" disabled="">
                        旋轉 90°
                    </button>
                    <button id="btn-rotate-180" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg transition text-sm font-medium border border-gray-300 disabled:opacity-50" disabled="">
                        旋轉 180°
                    </button>
                    <button id="btn-reset-corners" class="bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-lg transition text-sm font-medium border border-red-200 disabled:opacity-50" disabled="">
                        全圖 (重置端點)
                    </button>
                </div>
                <div class="p-3 bg-gray-50 rounded-lg border border-gray-200 text-xs text-gray-600">
                    💡 提示：您可以直接將圖片拖曳至下方「編輯區」進行處理。
                </div>

                <!-- 新增：2.5 雙圖拼貼助手 UI 區塊 -->
                <div class="p-4 bg-indigo-50/50 rounded-lg border border-indigo-100 space-y-3">
                    <h3 class="text-sm font-bold text-indigo-800 flex items-center gap-1.5">
                        <span>📚 雙圖拼貼助手 (二合一拼圖)</span>
                    </h3>
                    <p class="text-[11px] text-gray-500">
                        分別將兩張「高品質結果」存入插槽中，即可拼貼成一張大圖列印或儲存！
                    </p>
                    <div class="grid grid-cols-2 gap-3">
                        <!-- 插槽一 -->
                        <div id="slot-0" class="border border-dashed border-indigo-200 rounded-lg bg-white h-24 flex flex-col items-center justify-center relative overflow-hidden group">
                            <span class="text-xs text-gray-400">插槽一 (空)</span>
                        </div>
                        <!-- 插槽二 -->
                        <div id="slot-1" class="border border-dashed border-indigo-200 rounded-lg bg-white h-24 flex flex-col items-center justify-center relative overflow-hidden group">
                            <span class="text-xs text-gray-400">插槽二 (空)</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-add-collage" class="flex-1 text-xs bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-3 rounded transition shadow-sm disabled:opacity-40" disabled>
                            📥 存入當前結果
                        </button>
                        <button id="btn-clear-collage" class="text-xs bg-white hover:bg-gray-100 text-gray-600 font-semibold py-2.5 px-3 rounded border border-gray-200 transition">
                            🧹 清空
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 pt-1 border-t border-indigo-100">
                        <button id="btn-collage-h" class="text-xs bg-white hover:bg-indigo-100 text-indigo-700 font-bold py-2 rounded border border-indigo-200 transition disabled:opacity-40" disabled>
                            ↔️ 左右水平拼貼
                        </button>
                        <button id="btn-collage-v" class="text-xs bg-white hover:bg-indigo-100 text-indigo-700 font-bold py-2 rounded border border-indigo-200 transition disabled:opacity-40" disabled>
                            ↕️ 上下垂直拼貼
                        </button>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-lg font-semibold border-b pb-2 flex justify-between items-center">
                    2. 影像優化設定
                    <div class="flex items-center space-x-3 text-sm font-normal">
                        <label class="flex items-center space-x-1.5 cursor-pointer bg-gray-50 px-2 py-1 rounded border hover:bg-gray-100 transition">
                            <input type="checkbox" id="remove-shadow" class="w-4 h-4 text-blue-600 rounded" checked="" disabled="">
                            <span>啟用去陰影</span>
                        </label>
                    </div>
                </h2>
                
                <div id="advanced-settings" class="space-y-4 p-4 bg-blue-50/30 rounded-lg border border-blue-100">
                    <div class="p-3 bg-white rounded-lg border border-blue-100 shadow-sm">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-bold text-indigo-700">文字清晰化 (修復手震)</span>
                            <span id="sharpen-val" class="text-[10px] font-mono bg-gray-100 px-2 rounded border">關閉</span>
                        </div>
                        <input type="range" id="sharpen-level" min="0" max="4" step="1" value="0" class="w-full accent-indigo-600">
                    </div>

                    <div class="flex p-1 bg-gray-200 rounded-lg">
                        <button id="mode-bw" class="flex-1 py-1.5 text-sm font-medium rounded-md bg-white shadow-sm text-gray-800 transition-all">黑白模式</button>
                        <button id="mode-color" class="flex-1 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-700 transition-all">彩色模式</button>
                    </div>

                    <div id="bw-settings" class="space-y-3">
                        <div>
                            <div class="flex justify-between text-xs mb-1">
                                <span class="text-gray-600">感應範圍 (Block Size)</span>
                                <span id="block-size-val" class="font-bold text-blue-600">自動</span>
                            </div>
                            <input type="range" id="block-size" min="3" max="99" step="2" value="21" class="w-full" disabled="">
                        </div>
                        <div>
                            <div class="flex justify-between text-xs mb-1">
                                <span class="text-gray-600">亮度補償 (C Value)</span>
                                <span id="c-value-val" class="font-bold text-blue-600">自動</span>
                            </div>
                            <input type="range" id="c-value" min="0" max="30" step="1" value="10" class="w-full" disabled="">
                        </div>
                        <button id="btn-reset-params" class="w-full text-xs bg-white hover:bg-gray-100 text-blue-600 font-bold py-2 rounded border border-blue-200 transition disabled:opacity-50" disabled="">
                            🔄 恢復目前推薦數值
                        </button>
                    </div>

                    <div id="color-settings" class="hidden text-xs text-gray-600 bg-yellow-50 p-3 rounded border border-yellow-200 text-center">
                        🎨 彩色去陰影模式已啟用
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center">
            <button id="btn-process" class="bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white px-12 py-4 rounded-full text-lg font-bold shadow-xl transition transform hover:scale-105 disabled:opacity-50 flex items-center mx-auto" disabled="">
                執行校正輸出 ✨
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- 修復 3: 保持外層無 overflow-hidden 且可視 -->
            <div class="flex flex-col items-center border rounded-xl p-4 bg-white shadow-sm overflow-visible">
                <h3 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-tighter">編輯區</h3>
                <div class="w-full flex justify-center items-center flex-1 bg-gray-200 rounded min-h-[400px] transition-colors overflow-visible" id="canvas-area-wrapper">
                    <div class="canvas-container" id="canvas-container">
                        <canvas id="editor-canvas"></canvas>
                        <canvas id="overlay-canvas"></canvas>
                    </div>
                </div>
            </div>

            <div id="result-section" class="flex flex-col items-center border rounded-xl p-4 bg-white shadow-sm overflow-hidden min-h-[400px]">
                <div class="w-full flex justify-between items-center mb-3">
                    <h3 class="text-sm font-bold text-gray-500 uppercase tracking-tighter">高品質結果</h3>
                    <div class="flex space-x-2">
                        <button id="btn-print" class="bg-gray-700 hover:bg-gray-800 text-white px-4 py-1.5 rounded text-xs font-bold hidden shadow-sm transition">🖨️ 列印</button>
                        <button id="btn-download" class="bg-green-600 hover:bg-green-700 text-white px-4 py-1.5 rounded text-xs font-bold hidden shadow-sm transition">💾 下載 JPG</button>
                    </div>
                </div>
                <!-- 加上 Hover 提示與點擊放大功能 -->
                <div id="result-container" class="w-full flex-1 flex justify-center items-center bg-gray-50 rounded border-2 border-dashed border-gray-200 relative overflow-hidden p-4 group cursor-zoom-in">
                    <p id="result-placeholder" class="text-gray-400 absolute text-center text-xs">等待處理中...</p>
                    <canvas id="result-canvas" class="max-w-full h-auto shadow-lg hidden transition-transform duration-300 group-hover:scale-[1.01]"></canvas>
                    <div id="result-hover-overlay" class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors hidden flex justify-center items-center pointer-events-none">
                        <span class="bg-black/75 text-white px-4 py-2 rounded-full text-sm font-bold opacity-0 group-hover:opacity-100 transition-opacity transform translate-y-4 group-hover:translate-y-0 flex items-center gap-2 shadow-lg">
                            🔍 點擊滿版檢視
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 滿版圖片檢視器 (Modal) -->
        <div id="fullscreen-modal" class="hidden fixed inset-0 bg-black/95 z-[200] flex justify-center items-center backdrop-blur-sm">
            <button id="btn-close-modal" class="absolute top-6 right-6 text-white hover:text-gray-300 bg-white/20 hover:bg-white/30 rounded-full p-2 transition z-[201]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="relative w-full h-full p-4 flex justify-center items-center">
                <img id="fullscreen-img" class="max-w-full max-h-full object-contain cursor-zoom-out shadow-2xl modal-enter">
            </div>
        </div>

        <!-- 放大鏡 UI -->
        <div id="magnifier-container" class="hidden fixed pointer-events-none border-[3px] border-white rounded-full overflow-hidden shadow-[0_10px_25px_rgba(0,0,0,0.5)] z-[150] bg-gray-200" style="width: 140px; height: 140px;">
            <canvas id="magnifier-canvas" width="140" height="140" class="absolute top-0 left-0"></canvas>
            <div class="absolute inset-0 pointer-events-none">
                <div class="absolute top-1/2 left-1/2 w-1.5 h-1.5 bg-red-500 rounded-full transform -translate-x-1/2 -translate-y-1/2"></div>
                <div class="absolute top-1/2 left-0 w-full h-[1px] bg-red-500/50 transform -translate-y-1/2"></div>
                <div class="absolute top-0 left-1/2 w-[1px] h-full bg-red-500/50 transform -translate-x-1/2"></div>
            </div>
        </div>
    </div>

    <!-- 將原本的相對路徑改為 OpenCV CDN -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady()"></script>

    <script>
        let srcMat = null;
        let corners = []; 
        let scaleFactor = 1;
        let originalFileName = "document";
        
        // 拼貼暫存資料結構 (最多儲存2張 Base64)
        let collageImages = [];

        // 移除 PADDING，讓畫面最大化
        const PADDING = 0;
        let isBwMode = true; 

        const statusToast = document.getElementById('status-toast');
        const statusText = document.getElementById('status-text');
        const statusIcon = document.getElementById('status-icon');

        function updateStatus(text, icon = "⏳", type = "default") {
            statusText.textContent = text;
            statusIcon.textContent = icon;
            if (type === "success") {
                statusToast.classList.add('toast-success');
            } else {
                statusToast.classList.remove('toast-success');
            }
            statusToast.style.opacity = '0';
            setTimeout(() => statusToast.style.opacity = '1', 10);
        }

        const uploadInput = document.getElementById('image-upload');
        const editorCanvas = document.getElementById('editor-canvas');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const resultCanvas = document.getElementById('result-canvas');
        const container = document.getElementById('canvas-container');
        const canvasAreaWrapper = document.getElementById('canvas-area-wrapper');
        const btnProcess = document.getElementById('btn-process');
        const btnRotate90 = document.getElementById('btn-rotate-90');
        const btnRotate180 = document.getElementById('btn-rotate-180');
        const btnResetCorners = document.getElementById('btn-reset-corners');
        const btnDownload = document.getElementById('btn-download');
        const btnPrint = document.getElementById('btn-print');
        const btnResetParams = document.getElementById('btn-reset-params');
        const resultPlaceholder = document.getElementById('result-placeholder');
        const resultSection = document.getElementById('result-section');
        const resultHoverOverlay = document.getElementById('result-hover-overlay');
        
        // 拼貼元件聯動
        const btnAddCollage = document.getElementById('btn-add-collage');
        const btnClearCollage = document.getElementById('btn-clear-collage');
        const btnCollageH = document.getElementById('btn-collage-h');
        const btnCollageV = document.getElementById('btn-collage-v');

        // 滿版檢視相關元素
        const fullscreenModal = document.getElementById('fullscreen-modal');
        const fullscreenImg = document.getElementById('fullscreen-img');
        const btnCloseModal = document.getElementById('btn-close-modal');
        
        const removeShadowCheck = document.getElementById('remove-shadow');
        const blockSizeInput = document.getElementById('block-size');
        const cValueInput = document.getElementById('c-value');
        const blockSizeVal = document.getElementById('block-size-val');
        const cValueVal = document.getElementById('c-value-val');
        const sharpenLevel = document.getElementById('sharpen-level');
        const sharpenVal = document.getElementById('sharpen-val');

        sharpenLevel.addEventListener('input', (e) => {
            const levels = ["關閉", "微弱", "中等", "強烈", "極強"];
            sharpenVal.textContent = levels[e.target.value];
        });

        const btnModeBw = document.getElementById('mode-bw');
        const btnModeColor = document.getElementById('mode-color');
        const bwSettings = document.getElementById('bw-settings');
        const colorSettings = document.getElementById('color-settings');

        btnModeBw.addEventListener('click', () => {
            isBwMode = true;
            btnModeBw.className = "flex-1 py-1.5 text-sm font-medium rounded-md bg-white shadow-sm text-gray-800";
            btnModeColor.className = "flex-1 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-700";
            bwSettings.classList.remove('hidden');
            colorSettings.classList.add('hidden');
        });

        function handleFile(file) {

        function resetCornersToFullBoundary() {
            if (!srcMat) return;
            const w = srcMat.cols; const h = srcMat.rows;
            corners = [{x: 0, y: 0, id: 0}, {x: w, y: 0, id: 1}, {x: w, y: h, id: 2}, {x: 0, y: h, id: 3}];
        }

        btnResetCorners.addEventListener('click', () => {
            resetCornersToFullBoundary();
            autoUpdateParams();

        // ==========================================
        // 核心：專門對付「施工日報表」的表格干擾
        // ==========================================
        function adobeScanStyleDetect(src) {
            try {
                let maxDim = 800;
                let ratio = Math.max(1.0, Math.max(src.cols, src.rows) / maxDim);
                let width = Math.round(src.cols / ratio);
                let height = Math.round(src.rows / ratio);
                
                let small = new cv.Mat();
                cv.resize(src, small, new cv.Size(width, height), 0, 0, cv.INTER_AREA);
                
                let gray = new cv.Mat();
                cv.cvtColor(small, gray, cv.COLOR_RGBA2GRAY, 0);

                // 1. 雙邊濾波 (Bilateral Filter)
                let blurred = new cv.Mat();
                cv.bilateralFilter(gray, blurred, 9, 75, 75);

                // 2. Canny 邊緣偵測
                let edged = new cv.Mat();
                cv.Canny(blurred, edged, 50, 150);

                // 3. 形態學閉合運算
                let kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(5, 5));
                let morph = new cv.Mat();
                cv.morphologyEx(edged, morph, cv.MORPH_CLOSE, kernel);

                // 4. 尋找輪廓
                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(morph, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let cntsArray = [];
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    cntsArray.push({ cnt: cnt, area: area, index: i });
                }
                cntsArray.sort((a, b) => b.area - a.area);

                let bestPts = null;

                // 5. 迭代找尋四個頂點的紙張
                for (let i = 0; i < Math.min(5, cntsArray.length); i++) {
                    let cnt = cntsArray[i].cnt;
                    let area = cntsArray[i].area;
                    
                    if (area < (width * height * 0.05)) continue;

                    let peri = cv.arcLength(cnt, true);
                    let approx = new cv.Mat();
                    
                    cv.approxPolyDP(cnt, approx, 0.025 * peri, true);

                    if (approx.rows === 4 && cv.isContourConvex(approx)) {
                        bestPts = [];
                        for (let j = 0; j < 4; j++) {
                            bestPts.push({ 
                                x: approx.data32S[j*2] * ratio, 
                                y: approx.data32S[j*2+1] * ratio 
                            });
                        }
                        approx.delete();
                        break;
                    }
                    approx.delete();
                }

                small.delete(); gray.delete(); blurred.delete(); edged.delete(); 
                kernel.delete(); morph.delete(); contours.delete(); hierarchy.delete();

                if (bestPts) return orderPts(bestPts);
                return null;
            } catch (e) { 
                console.error("邊緣偵測發生錯誤:", e);
                return null; 
            }
        }

        function orderPts(pts) {
            let cx = pts.reduce((sum, p) => sum + p.x, 0) / 4;
            let cy = pts.reduce((sum, p) => sum + p.y, 0) / 4;

            let sortedPts = pts.map(p => {
                return {
                    x: p.x,
                    y: p.y,
                    angle: Math.atan2(p.y - cy, p.x - cx) * 180 / Math.PI
                };
            });

            sortedPts.sort((a, b) => a.angle - b.angle);

            return [
                { x: sortedPts[0].x, y: sortedPts[0].y, id: 0 },
                { x: sortedPts[1].x, y: sortedPts[1].y, id: 1 },
                { x: sortedPts[2].x, y: sortedPts[2].y, id: 2 },
                { x: sortedPts[3].x, y: sortedPts[3].y, id: 3 }
            ];
        }

        function autoUpdateParams() {
            if (!srcMat || corners.length < 4) return;
            let minX = Math.max(0, Math.min(...corners.map(p => p.x)));
            let maxX = Math.min(srcMat.cols - 1, Math.max(...corners.map(p => p.x)));
            let minY = Math.max(0, Math.min(...corners.map(p => p.y)));
            let maxY = Math.min(srcMat.rows - 1, Math.max(...corners.map(p => p.y)));
            let roiW = maxX - minX; let roiH = maxY - minY;
            if (roiW <= 0 || roiH <= 0) return;
            
            let roi = srcMat.roi(new cv.Rect(minX, minY, roiW, roiH));
            let gray = new cv.Mat();
            cv.cvtColor(roi, gray, cv.COLOR_RGBA2GRAY, 0);
            let std = new cv.Mat(); let mean = new cv.Mat();
            cv.meanStdDev(gray, mean, std);
            
            let sd = std.data64F[0];
            let m = mean.data64F[0];

            let recBlockSize = Math.max(21, Math.floor(Math.max(roi.cols, roi.rows) * 0.02));
            if (recBlockSize % 2 === 0) recBlockSize++;
            
            let recCValue;
            if (sd > 50) recCValue = 15;
            else if (sd > 35) recCValue = 12;
            else if (sd > 20) recCValue = 9;
            else recCValue = 6;

            if (m > 200 && recCValue > 8) recCValue -= 2;
            if (m < 100) recCValue += 2;

            blockSizeInput.value = recBlockSize;
            cValueInput.value = recCValue;
            blockSizeVal.textContent = recBlockSize + " (自動)";
            cValueVal.textContent = recCValue + " (自動)";
            
            roi.delete(); gray.delete(); mean.delete(); std.delete();
        }

        function renderEditor() {
            if (!srcMat) return;
            const wrap = document.getElementById('canvas-area-wrapper');
            scaleFactor = Math.min(1.0, (wrap.clientWidth - 40) / srcMat.cols);
            const dW = srcMat.cols * scaleFactor; const dH = srcMat.rows * scaleFactor;
            editorCanvas.width = dW; editorCanvas.height = dH;
            overlayCanvas.width = dW; overlayCanvas.height = dH;
            let rz = new cv.Mat();
            cv.resize(srcMat, rz, new cv.Size(dW, dH), 0, 0, cv.INTER_AREA);
            cv.imshow('editor-canvas', rz);
            rz.delete();
            container.querySelectorAll('.corner-handle').forEach(h => h.remove());
            corners.forEach((c, i) => {
                const h = document.createElement('div');
                h.className = 'corner-handle'; h.dataset.id = i;
                h.style.left = (c.x * scaleFactor + PADDING) + 'px';
                h.style.top = (c.y * scaleFactor + PADDING) + 'px';
                h.addEventListener('mousedown', startDrag);
                h.addEventListener('touchstart', startDrag, {passive: false});
                container.appendChild(h);
            });
            drawOverlay();
        }

        function drawOverlay() {
            const ctx = overlayCanvas.getContext('2d');
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            const p = corners.map(c => ({ x: c.x * scaleFactor, y: c.y * scaleFactor }));
            ctx.beginPath();
            ctx.moveTo(p[0].x, p[0].y); ctx.lineTo(p[1].x, p[1].y);
            ctx.lineTo(p[2].x, p[2].y); ctx.lineTo(p[3].x, p[3].y);
            ctx.closePath();
            ctx.fillStyle = 'rgba(59, 130, 246, 0.2)'; ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = '#2563eb';
            ctx.setLineDash([5, 5]); ctx.stroke();
        }

        let activeH = null;
        function startDrag(e) { 
            e.preventDefault(); 
            activeH = e.target; 
            document.getElementById('magnifier-container').classList.remove('hidden');
            document.addEventListener('mousemove', drag); 
            document.addEventListener('mouseup', stopDrag); 
            document.addEventListener('touchmove', drag, {passive: false}); 
            document.addEventListener('touchend', stopDrag); 
        }
        function stopDrag() { 
            activeH = null; 
            document.getElementById('magnifier-container').classList.add('hidden');
            autoUpdateParams(); 
            document.removeEventListener('mousemove', drag); 
            document.removeEventListener('mouseup', stopDrag); 
            document.removeEventListener('touchmove', drag); 
            document.removeEventListener('touchend', stopDrag); 
        }
        
        function drag(e) {
            if (!activeH) return;
            const cx = e.clientX || (e.touches && e.touches[0].clientX);
            const cy = e.clientY || (e.touches && e.touches[0].clientY);
            const rect = container.getBoundingClientRect();
            
            let x = cx - rect.left; 
            let y = cy - rect.top;

            // 放寬限制端點拖曳範圍，最大超出邊緣為畫布本身寬高的 100% 緩衝 (適用於極端歪斜)
            const bufferX = rect.width * 1.0;
            const bufferY = rect.height * 1.0;
            x = Math.max(-bufferX, Math.min(x, rect.width + bufferX));
            y = Math.max(-bufferY, Math.min(y, rect.height + bufferY));

            activeH.style.left = x + 'px'; 
            activeH.style.top = y + 'px';
            const id = parseInt(activeH.dataset.id);
            corners[id].x = (x - PADDING) / scaleFactor;
            corners[id].y = (y - PADDING) / scaleFactor;
            drawOverlay();

            // 更新放大鏡
            const magContainer = document.getElementById('magnifier-container');
            const magCanvas = document.getElementById('magnifier-canvas');
            if (magCanvas) {
                const magCtx = magCanvas.getContext('2d');
                const magSize = 140;
                const zoom = 2.5; 
                const srcSize = magSize / zoom;
                
                let magLeft = cx + 30;
                let magTop = cy - magSize - 30;
                
                if (magTop < 10) magTop = cy + 40;
                if (magLeft + magSize > window.innerWidth) magLeft = cx - magSize - 30;
                
                magContainer.style.left = magLeft + 'px';
                magContainer.style.top = magTop + 'px';
                
                let canvasX = x - PADDING;
                let canvasY = y - PADDING;
                
                magCtx.fillStyle = '#e5e7eb';
                magCtx.fillRect(0, 0, magSize, magSize);
                magCtx.drawImage(editorCanvas, canvasX - srcSize/2, canvasY - srcSize/2, srcSize, srcSize, 0, 0, magSize, magSize);
                magCtx.drawImage(overlayCanvas, canvasX - srcSize/2, canvasY - srcSize/2, srcSize, srcSize, 0, 0, magSize, magSize);
            }
        }

        function applySharpen(src, level) {
            if (level === 0) return src.clone();
            let dst = new cv.Mat();
            let kernel;
            if (level === 1) {
                kernel = cv.matFromArray(3, 3, cv.CV_32F, [0, -0.25, 0, -0.25, 2, -0.25, 0, -0.25, 0]);
            } else if (level === 2) {
                kernel = cv.matFromArray(3, 3, cv.CV_32F, [0, -0.5, 0, -0.5, 3, -0.5, 0, -0.5, 0]);
            } else if (level === 3) {
                kernel = cv.matFromArray(3, 3, cv.CV_32F, [0, -1, 0, -1, 5, -1, 0, -1, 0]);
            } else {
                kernel = cv.matFromArray(3, 3, cv.CV_32F, [-1, -1, -1, -1, 9, -1, -1, -1, -1]);
            }
            cv.filter2D(src, dst, -1, kernel);
            kernel.delete();
            return dst;
        }

        function enhanceColorDocument(src) {
            let bg = new cv.Mat();
            let kSize = Math.floor(Math.max(src.cols, src.rows) / 35);
            if (kSize % 2 === 0) kSize++;
            if (kSize < 21) kSize = 21;
            cv.blur(src, bg, new cv.Size(kSize, kSize));
            
            let dst = new cv.Mat();
            cv.divide(src, bg, dst, 255.0, -1);
            
            bg.delete();
            return dst;
        }

        btnProcess.addEventListener('click', () => {
            if (!srcMat) return;
            updateStatus("正在進行去黑邊校正與影像優化...", "⏳");
            
            setTimeout(() => {
                let tl = corners[0]; let tr = corners[1]; let br = corners[2]; let bl = corners[3];
                let w = Math.max(Math.hypot(br.x-bl.x, br.y-bl.y), Math.hypot(tr.x-tl.x, tr.y-tl.y));
                let h = Math.max(Math.hypot(tr.x-br.x, tr.y-br.y), Math.hypot(tl.x-bl.x, tl.y-bl.y));
                
                let sT = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
                let dT = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, w, 0, w, h, 0, h]);
                let m = cv.getPerspectiveTransform(sT, dT);
                let warped = new cv.Mat();
                cv.warpPerspective(srcMat, warped, m, new cv.Size(w, h));
                
                let cropX = Math.max(12, Math.floor(w * 0.01));
                let cropY = Math.max(12, Math.floor(h * 0.01));
                let cropW = Math.max(10, Math.floor(w - 2 * cropX));
                let cropH = Math.max(10, Math.floor(h - 2 * cropY));
                
                let rect = new cv.Rect(cropX, cropY, cropW, cropH);
                let cropped = warped.roi(rect);
                
                let rgbCropped = new cv.Mat();
                cv.cvtColor(cropped, rgbCropped, cv.COLOR_RGBA2RGB, 0);

                let enhancedTemp = null;
                if (removeShadowCheck.checked) {
                    enhancedTemp = enhanceColorDocument(rgbCropped);
                } else {
                    enhancedTemp = rgbCropped.clone();
                }
                
                let sL = parseInt(sharpenLevel.value);
                let sharpened = applySharpen(enhancedTemp, sL);
                
                let finalRes = null;
                if (isBwMode) {
                    let gray = new cv.Mat();
                    cv.cvtColor(sharpened, gray, cv.COLOR_RGB2GRAY, 0);
                    if (removeShadowCheck.checked) {
                        finalRes = new cv.Mat();
                        let bS = parseInt(blockSizeInput.value); if (bS % 2 === 0) bS++;
                        cv.adaptiveThreshold(gray, finalRes, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, bS, parseInt(cValueInput.value));
                    } else {
                        finalRes = gray.clone();
                    }
                    gray.delete();
                } else {
                    finalRes = sharpened.clone();
                }
                
                cv.imshow('result-canvas', finalRes);
                resultCanvas.classList.remove('hidden');
                resultPlaceholder.classList.add('hidden');
                resultHoverOverlay.classList.remove('hidden');
                btnDownload.classList.remove('hidden');
                btnPrint.classList.remove('hidden');
                
                // 處理完成後允許存入拼貼暫存
                btnAddCollage.disabled = false;

                updateStatus("校正完成，邊緣已修整", "✅", "success");

                resultSection.scrollIntoView({ behavior: 'smooth' });
                
                sT.delete(); dT.delete(); m.delete(); warped.delete(); cropped.delete(); 
                rgbCropped.delete(); enhancedTemp.delete(); sharpened.delete(); finalRes.delete();
            }, 50);
        });

        function rotateImage(mode) {
            if (!srcMat) return;
            let dst = new cv.Mat();
            if (mode === 90) {
                cv.rotate(srcMat, dst, cv.ROTATE_90_CLOCKWISE);
                let oldH = srcMat.rows;
                corners = orderPts(corners.map(p => ({ x: oldH - p.y, y: p.x, id: p.id })));
            } else if (mode === 180) {
                cv.rotate(srcMat, dst, cv.ROTATE_180);
                let oldW = srcMat.cols;
                let oldH = srcMat.rows;
                corners = orderPts(corners.map(p => ({ x: oldW - p.x, y: oldH - p.y, id: p.id })));
            }
            srcMat.delete(); srcMat = dst;
            renderEditor();
        }

        // ==========================================
        // 核心新增：雙圖拼貼助手邏輯

        // 執行拼貼合併 (Stitching)
        function makeCollage(direction) {
            if (collageImages.length < 2) return;
            updateStatus("正在合成文件拼貼中...", "⏳");

            const img1 = new Image();
            const img2 = new Image();

            img1.onload = () => {
                img2.onload = () => {
                    const ctx = resultCanvas.getContext('2d');
                    const w1 = img1.width;
                    const h1 = img1.height;
                    const w2 = img2.width;
                    const h2 = img2.height;

                    if (direction === 'horizontal') {
                        // 左右水平拼貼：以第一張圖片的高度為基準，等比例縮放第二張
                        const scale2 = h1 / h2;
                        const newW2 = w2 * scale2;

                        resultCanvas.width = w1 + newW2;
                        resultCanvas.height = h1;

                        ctx.fillStyle = "#ffffff";
                        ctx.fillRect(0, 0, resultCanvas.width, resultCanvas.height);
                        ctx.drawImage(img1, 0, 0, w1, h1);
                        ctx.drawImage(img2, w1, 0, newW2, h1);
                    } else {
                        // 上下垂直拼貼：以第一張圖片的寬度為基準，等比例縮放第二張
                        const scale2 = w1 / w2;
                        const newH2 = h2 * scale2;

                        resultCanvas.width = w1;
                        resultCanvas.height = h1 + newH2;

                        ctx.fillStyle = "#ffffff";
                        ctx.fillRect(0, 0, resultCanvas.width, resultCanvas.height);
                        ctx.drawImage(img1, 0, 0, w1, h1);
                        ctx.drawImage(img2, 0, h1, w1, newH2);
                    }

                    // 重新將結果顯現在預覽區，並提供下載/列印
                    resultCanvas.classList.remove('hidden');
                    resultPlaceholder.classList.add('hidden');
                    resultHoverOverlay.classList.remove('hidden');
                    btnDownload.classList.remove('hidden');
                    btnPrint.classList.remove('hidden');

                    updateStatus("雙圖二合一拼貼成功！", "✨", "success");
                    resultSection.scrollIntoView({ behavior: 'smooth' });
                };
                img2.src = collageImages[1];
            };
            img1.src = collageImages[0];
        }

        btnCollageH.addEventListener('click', () => makeCollage('horizontal'));
        btnCollageV.addEventListener('click', () => makeCollage('vertical'));
    </script>
</body>
</html>
