<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人紀錄小幫手</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    body { background-color: #f8fafc; }
    /* 自訂隱藏捲軸但可滾動 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- 圖示組件 ---
    const SvgIcon = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Clock = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></SvgIcon>;
    const Activity = (p) => <SvgIcon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></SvgIcon>;
    const Settings = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></SvgIcon>;
    const Plus = (p) => <SvgIcon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></SvgIcon>;
    const RotateCcw = (p) => <SvgIcon {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></SvgIcon>;
    const Trash2 = (p) => <SvgIcon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></SvgIcon>;
    const RefreshCw = (p) => <SvgIcon {...p}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></SvgIcon>;
    const CheckCircle = (p) => <SvgIcon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></SvgIcon>;
    const AlertCircle = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></SvgIcon>;
    const BarChart3 = (p) => <SvgIcon {...p}><path d="M3 3v18h18"/><rect x="7" y="14" width="4" height="5" rx="1"/><rect x="15" y="7" width="4" height="12" rx="1"/></SvgIcon>;
    const Home = (p) => <SvgIcon {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></SvgIcon>;
    const Save = (p) => <SvgIcon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></SvgIcon>;
    const Upload = (p) => <SvgIcon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></SvgIcon>;
    const AlertTriangle = (p) => <SvgIcon {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></SvgIcon>;
    const TrendingUp = (p) => <SvgIcon {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></SvgIcon>;
    const Calendar = (p) => <SvgIcon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></SvgIcon>;

    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [records, setRecords] = useState([]);
      const [apiUrl, setApiUrl] = useState('');
      const [syncStatus, setSyncStatus] = useState('idle');
      const [syncMessage, setSyncMessage] = useState('');
      const [customDate, setCustomDate] = useState('');
      const [isLoading, setIsLoading] = useState(true);

      const [importYear, setImportYear] = useState(new Date().getFullYear().toString());
      const [importData, setImportData] = useState('');
      const [importMessage, setImportMessage] = useState('');
      const [selectedDeleteYear, setSelectedDeleteYear] = useState('');

      useEffect(() => {
        const savedUrl = localStorage.getItem('tracker_api_url');
        const savedRecords = localStorage.getItem('tracker_records');
        if (savedUrl) setApiUrl(savedUrl);
        if (savedRecords) {
          try { setRecords(JSON.parse(savedRecords)); } catch (e) { console.error(e); }
        }
        setIsLoading(false);
      }, []);

      useEffect(() => {
        if (apiUrl && apiUrl.startsWith('http')) fetchDataFromCloud();
      }, [apiUrl]);

      const availableYears = useMemo(() => {
        const years = new Set(records.map(r => new Date(r.timestamp).getFullYear()));
        return Array.from(years).sort((a, b) => b - a);
      }, [records]);

      // --- 實作強制同步功能 ---
      const overwriteLocalWithCloud = async () => {
        if (!apiUrl) return alert('請先設定 API 網址');
        if (!window.confirm('【警告】這將會清除設備上的所有本地紀錄，並完全替換為雲端資料。\n\n確定要繼續嗎？')) return;
        
        setSyncStatus('syncing'); setSyncMessage('下載中...');
        try {
          const response = await fetch(apiUrl);
          const data = await response.json();
          if (Array.isArray(data)) {
            data.sort((a, b) => b.timestamp - a.timestamp);
            setRecords(data);
            localStorage.setItem('tracker_records', JSON.stringify(data));
            setSyncStatus('success'); setSyncMessage('已成功覆蓋本地資料！');
            alert('已成功用雲端資料覆蓋本地紀錄！');
          } else {
            throw new Error('雲端資料格式錯誤');
          }
        } catch (error) {
          setSyncStatus('error'); setSyncMessage('下載失敗');
          alert('下載失敗，請檢查 API 網址或網路狀態。');
        } finally {
          setTimeout(() => { setSyncStatus('idle'); setSyncMessage(''); }, 3000);
        }
      };

      const overwriteCloudWithLocal = async () => {
        if (!apiUrl) return alert('請先設定 API 網址');
        if (!window.confirm('【警告】這將會覆蓋雲端上的所有紀錄，替換為您目前設備上的資料。\n\n確定要繼續嗎？')) return;
        
        setSyncStatus('syncing'); setSyncMessage('上傳中...');
        try {
          await fetch(apiUrl, { method: 'POST', body: JSON.stringify(records), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
          setSyncStatus('success'); setSyncMessage('已成功覆蓋雲端資料！');
          alert('已成功用本地資料覆蓋雲端紀錄！');
        } catch (error) {
          setSyncStatus('error'); setSyncMessage('上傳失敗');
          alert('上傳失敗，請檢查 API 網址或網路狀態。');
        } finally {
          setTimeout(() => { setSyncStatus('idle'); setSyncMessage(''); }, 3000);
        }
      };

      const forceSync = async () => { /* 略，同前版本 */ };
      const deleteRecordsByYear = () => { /* 略，同前版本 */ };
      const syncToCloud = async (currentRecords) => { /* 略，同前版本 */ };
      const fetchDataFromCloud = async () => { /* 略，同前版本 */ };
      const addRecord = (timeMs) => { /* 略，同前版本 */ };
      const deleteRecord = (id) => { /* 略，同前版本 */ };
      const saveApiSetting = () => { /* 略，同前版本 */ };
      const handleImport = () => { /* 略，同前版本 */ };

      // 省略部分 API 程式碼保持與之前相同，聚焦於新增數據分析
      const forceSyncImplementation = async () => {
        if (!apiUrl) return alert('請先設定 API 網址');
        setSyncStatus('syncing'); setSyncMessage('同步中...');
        try {
          const response = await fetch(apiUrl);
          const data = await response.json();
          let mergedRecords = [...records];
          if (Array.isArray(data)) {
            const localIds = new Set(records.map(r => r.id));
            data.forEach(c => { if (!localIds.has(c.id)) mergedRecords.push(c); });
          }
          mergedRecords.sort((a, b) => b.timestamp - a.timestamp);
          setRecords(mergedRecords);
          localStorage.setItem('tracker_records', JSON.stringify(mergedRecords));
          await fetch(apiUrl, { method: 'POST', body: JSON.stringify(mergedRecords), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
          setSyncStatus('success'); setSyncMessage('合併完成！');
          setTimeout(() => { setSyncStatus('idle'); setSyncMessage(''); }, 3000);
        } catch (error) {
          setSyncStatus('error'); setSyncMessage('同步失敗');
          setTimeout(() => { setSyncStatus('idle'); setSyncMessage(''); }, 5000);
        }
      };

      const addRecordImplementation = (timeMs) => {
        const ONE_HOUR = 60 * 60 * 1000;
        if (records.some(r => Math.abs(r.timestamp - timeMs) < ONE_HOUR) && !window.confirm('一小時內已有紀錄，確定新增？')) return;
        const newRecords = [...records, { id: crypto.randomUUID(), timestamp: timeMs }].sort((a, b) => b.timestamp - a.timestamp);
        setRecords(newRecords); localStorage.setItem('tracker_records', JSON.stringify(newRecords));
        if (apiUrl) fetch(apiUrl, { method: 'POST', body: JSON.stringify(newRecords), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
      };

      const deleteRecordImplementation = (id) => {
        if (!window.confirm('確定刪除？')) return;
        const newRecords = records.filter(r => r.id !== id);
        setRecords(newRecords); localStorage.setItem('tracker_records', JSON.stringify(newRecords));
        if (apiUrl) fetch(apiUrl, { method: 'POST', body: JSON.stringify(newRecords), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
      };

      // 💡 強化版的數據統計邏輯
      const stats = useMemo(() => {
        const now = new Date();
        const currentYear = now.getFullYear();
        const startOfYear = new Date(currentYear, 0, 1);
        const daysPassedThisYear = Math.floor((now - startOfYear) / (1000 * 60 * 60 * 24)) + 1;
        
        const sortedDesc = [...records].sort((a, b) => b.timestamp - a.timestamp);
        const sortedAsc = [...records].sort((a, b) => a.timestamp - b.timestamp);
        
        // 基礎計數
        let thisYearCount = 0, lastYearCount = 0;
        let last7DaysCount = 0, last30DaysCount = 0;
        let maxGapMs = 0;
        const yearlyCounts = {};
        
        // 進階分析陣列
        const timeOfDayCounts = [0, 0, 0, 0]; // [凌晨 0-6, 早上 6-12, 下午 12-18, 晚上 18-24]
        const dayOfWeekCounts = [0, 0, 0, 0, 0, 0, 0]; // [日, 一, 二, 三, 四, 五, 六]

        // 近 12 個月趨勢
        const monthlyTrendLabels = Array(12).fill('');
        const monthlyTrendCounts = Array(12).fill(0);
        for (let i = 11; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          monthlyTrendLabels[11 - i] = `${d.getMonth() + 1}月`;
        }

        const nowMs = now.getTime();
        const MS_PER_DAY = 1000 * 60 * 60 * 24;

        sortedAsc.forEach((r, i) => {
          const d = new Date(r.timestamp);
          const year = d.getFullYear();
          const month = d.getMonth();
          const hour = d.getHours();
          const day = d.getDay();
          
          // 年度統計
          yearlyCounts[year] = (yearlyCounts[year] || 0) + 1;
          if (year === currentYear) thisYearCount++;
          if (year === currentYear - 1) lastYearCount++;

          // 短期統計 (7天 / 30天)
          const daysAgo = (nowMs - r.timestamp) / MS_PER_DAY;
          if (daysAgo <= 7) last7DaysCount++;
          if (daysAgo <= 30) last30DaysCount++;

          // 近 12 個月趨勢計算
          const monthDiff = (now.getFullYear() - year) * 12 + (now.getMonth() - month);
          if (monthDiff >= 0 && monthDiff < 12) {
            monthlyTrendCounts[11 - monthDiff]++;
          }

          // 時段與星期統計
          if (hour >= 0 && hour < 6) timeOfDayCounts[0]++;
          else if (hour >= 6 && hour < 12) timeOfDayCounts[1]++;
          else if (hour >= 12 && hour < 18) timeOfDayCounts[2]++;
          else timeOfDayCounts[3]++;
          
          dayOfWeekCounts[day]++;

          // 計算最大間隔
          if (i > 0) {
            const gap = r.timestamp - sortedAsc[i-1].timestamp;
            if (gap > maxGapMs) maxGapMs = gap;
          }
        });

        // 預測今年總數
        const daysInYear = currentYear % 4 === 0 ? 366 : 365;
        const yearlyProjection = daysPassedThisYear > 0 ? Math.round((thisYearCount / daysPassedThisYear) * daysInYear) : 0;

        // 計算最大值供圖表使用
        const maxTimeOfDay = Math.max(...timeOfDayCounts, 1);
        const maxDayOfWeek = Math.max(...dayOfWeekCounts, 1);
        const maxMonthlyTrend = Math.max(...monthlyTrendCounts, 1);

        const yearlyStatsArray = Object.keys(yearlyCounts)
          .map(y => ({ year: y, count: yearlyCounts[y] }))
          .sort((a, b) => b.year - a.year);

        const timeSinceLast = sortedDesc.length > 0 ? nowMs - sortedDesc[0].timestamp : null;
        let avgIntervalDays = sortedAsc.length > 1 ? ((sortedAsc[sortedAsc.length - 1].timestamp - sortedAsc[0].timestamp) / (sortedAsc.length - 1)) / MS_PER_DAY : 0;

        let healthAdvice = "資料累積中，保持紀錄好習慣！";
        if (sortedAsc.length >= 2) {
          if (avgIntervalDays < 2) healthAdvice = "近期頻率偏高，建議尋找其他興趣轉移注意力，給身體修復的時間喔！";
          else if (avgIntervalDays <= 4) healthAdvice = "頻率適中，繼續保持規律的作息與健康生活。";
          else healthAdvice = "間隔控制得非常棒！展現了良好的自律能力，繼續維持！";
        }

        return {
          total: records.length,
          thisYearCount,
          lastYearCount,
          last7DaysCount,
          last30DaysCount,
          daysPassedThisYear,
          yearlyProjection,
          yearlyStats: yearlyStatsArray,
          currentStreakDays: timeSinceLast !== null ? (timeSinceLast / MS_PER_DAY).toFixed(1) : '0.0',
          maxGapDays: (maxGapMs / MS_PER_DAY).toFixed(1),
          avgIntervalDays: avgIntervalDays.toFixed(1),
          healthAdvice,
          timeOfDay: { counts: timeOfDayCounts, max: maxTimeOfDay },
          dayOfWeek: { counts: dayOfWeekCounts, max: maxDayOfWeek },
          monthlyTrend: { labels: monthlyTrendLabels, counts: monthlyTrendCounts, max: maxMonthlyTrend }
        };
      }, [records]);

      const renderHome = () => (
        <div className="space-y-6 animate-[fadeIn_0.5s_ease-out]">
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center">
              <Clock className="w-5 h-5 mr-2 text-indigo-500" />
              新增紀錄
            </h2>
            <div className="grid grid-cols-2 gap-3 mb-4">
              <button onClick={() => addRecordImplementation(Date.now())} className="bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-semibold shadow-md shadow-indigo-200 transition-all active:scale-95 flex flex-col items-center justify-center gap-1">
                <Plus className="w-6 h-6" />現在 (Now)
              </button>
              <button onClick={() => addRecordImplementation(Date.now() - 5 * 60 * 1000)} className="bg-sky-500 hover:bg-sky-600 text-white py-4 rounded-2xl font-semibold shadow-md shadow-sky-200 transition-all active:scale-95 flex flex-col items-center justify-center gap-1">
                <RotateCcw className="w-6 h-6" />5分鐘前
              </button>
            </div>
            <div className="flex items-center gap-2 mt-4 pt-4 border-t border-slate-100">
              <input type="datetime-local" value={customDate} onChange={(e) => setCustomDate(e.target.value)} className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-slate-700 outline-none focus:border-indigo-500" />
              <button onClick={() => { if(!customDate) return alert('請先選擇時間'); addRecordImplementation(new Date(customDate).getTime()); setCustomDate(''); }} className="bg-slate-800 text-white px-5 py-2 rounded-xl font-medium hover:bg-slate-700">補登</button>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <div className="bg-gradient-to-br from-indigo-500 to-indigo-600 p-5 rounded-3xl text-white shadow-md">
              <p className="text-indigo-100 text-sm font-medium mb-1">距離上次</p>
              <div className="text-3xl font-bold">{stats.currentStreakDays} <span className="text-lg font-normal">天</span></div>
            </div>
            <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
              <p className="text-slate-500 text-sm font-medium mb-1">近 30 天累計</p>
              <div className="text-3xl font-bold text-slate-800">{stats.last30DaysCount} <span className="text-lg font-normal text-slate-400">次</span></div>
            </div>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-20">
            <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center">
              <Activity className="w-5 h-5 mr-2 text-teal-500" />最近紀錄
            </h2>
            {records.length === 0 ? <p className="text-slate-400 text-center py-6">尚無紀錄</p> : (
              <div className="space-y-3">
                {[...records].sort((a, b) => b.timestamp - a.timestamp).slice(0, 5).map(r => (
                  <div key={r.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                    <div className="flex items-center gap-3">
                      <div className="w-2 h-2 rounded-full bg-teal-400"></div>
                      <div>
                        <p className="text-slate-800 font-medium">{new Date(r.timestamp).toLocaleDateString('zh-TW', { month: 'short', day: 'numeric', weekday: 'short' })}</p>
                        <p className="text-slate-500 text-sm">{new Date(r.timestamp).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })}</p>
                      </div>
                    </div>
                    <button onClick={() => deleteRecordImplementation(r.id)} className="p-2 text-slate-300 hover:text-red-500 transition-colors"><Trash2 className="w-5 h-5" /></button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );

      const renderStats = () => (
        <div className="space-y-6 animate-[fadeIn_0.5s_ease-out] pb-20">
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center">
              <BarChart3 className="w-6 h-6 mr-2 text-indigo-500" />
              數據分析中心
            </h2>

            {/* 1. 健康建議 */}
            <div className="bg-indigo-50 p-4 rounded-2xl border border-indigo-100 mb-6">
              <h3 className="text-indigo-800 font-bold mb-2 flex items-center text-sm">
                <Activity className="w-4 h-4 mr-2" />專屬頻率建議
              </h3>
              <p className="text-indigo-900/80 text-sm leading-relaxed">{stats.healthAdvice}</p>
            </div>
            
            {/* 2. 核心指標與預測 */}
            <div className="grid grid-cols-2 gap-4 mb-6">
              <div className="p-4 bg-slate-50 rounded-2xl relative overflow-hidden">
                <div className="absolute -right-2 -bottom-2 text-slate-100/50"><TrendingUp className="w-16 h-16" /></div>
                <p className="text-slate-500 text-xs font-semibold mb-1 relative z-10">今年度總計</p>
                <p className="text-2xl font-bold text-indigo-600 relative z-10">{stats.thisYearCount} <span className="text-sm font-normal text-slate-400">次</span></p>
                <p className="text-[11px] text-slate-400 mt-1 relative z-10">依目前配速，今年預計達 <span className="font-bold text-indigo-500">{stats.yearlyProjection}</span> 次</p>
              </div>
              <div className="p-4 bg-slate-50 rounded-2xl">
                <p className="text-slate-500 text-xs font-semibold mb-1">平均間隔</p>
                <p className="text-2xl font-bold text-teal-600">{stats.avgIntervalDays} <span className="text-sm font-normal text-slate-400">天</span></p>
                <p className="text-[11px] text-slate-400 mt-1">最長禁慾: {stats.maxGapDays} 天</p>
              </div>
            </div>

            {/* 3. 新增：星期分佈分析 (長條圖) */}
            <h3 className="text-sm font-bold text-slate-700 mb-3 border-b pb-2 flex items-center">
              <Calendar className="w-4 h-4 mr-2 text-slate-400" />哪一天最常發生？ (星期分佈)
            </h3>
            <div className="flex items-end justify-between h-32 mb-8 mt-4 px-2">
              {['日', '一', '二', '三', '四', '五', '六'].map((day, i) => {
                const count = stats.dayOfWeek.counts[i];
                const height = stats.dayOfWeek.max > 0 ? (count / stats.dayOfWeek.max) * 100 : 0;
                const isMax = count === stats.dayOfWeek.max && count > 0;
                return (
                  <div key={day} className="flex flex-col items-center w-[12%] group">
                    <span className={`text-[10px] mb-1 font-medium transition-opacity ${count > 0 ? 'opacity-100 text-slate-600' : 'opacity-0'}`}>{count}</span>
                    <div className="w-full h-24 bg-slate-100 rounded-t-lg relative flex items-end justify-center overflow-hidden">
                      <div 
                        className={`w-full rounded-t-lg transition-all duration-700 ease-out ${isMax ? 'bg-indigo-500' : 'bg-indigo-200 group-hover:bg-indigo-300'}`} 
                        style={{ height: `${height}%` }}
                      ></div>
                    </div>
                    <span className={`text-xs mt-2 font-medium ${day === '日' || day === '六' ? 'text-rose-400' : 'text-slate-500'} ${isMax ? 'font-bold text-indigo-700' : ''}`}>{day}</span>
                  </div>
                );
              })}
            </div>

            {/* 新增：近 12 個月趨勢圖 */}
            <h3 className="text-sm font-bold text-slate-700 mb-3 border-b pb-2 flex items-center mt-6">
              <Activity className="w-4 h-4 mr-2 text-slate-400" />近一年趨勢 (每月累計)
            </h3>
            <div className="flex items-end justify-between h-32 mb-8 mt-4 px-1 gap-1">
              {stats.monthlyTrend.labels.map((label, i) => {
                const count = stats.monthlyTrend.counts[i];
                const height = stats.monthlyTrend.max > 0 ? (count / stats.monthlyTrend.max) * 100 : 0;
                const isMax = count === stats.monthlyTrend.max && count > 0;
                return (
                  <div key={i} className="flex flex-col items-center flex-1 group">
                    <span className={`text-[9px] mb-1 font-medium transition-opacity ${count > 0 ? 'opacity-100 text-slate-600' : 'opacity-0'}`}>{count}</span>
                    <div className="w-full h-24 bg-slate-100 rounded-t-sm relative flex items-end justify-center overflow-hidden">
                      <div 
                        className={`w-full rounded-t-sm transition-all duration-700 ease-out ${isMax ? 'bg-teal-500' : 'bg-teal-200 group-hover:bg-teal-300'}`} 
                        style={{ height: `${height}%` }}
                      ></div>
                    </div>
                    <span className={`text-[9px] mt-1 font-medium text-slate-500 whitespace-nowrap ${isMax ? 'font-bold text-teal-700' : ''}`}>{label}</span>
                  </div>
                );
              })}
            </div>

            {/* 4. 原有的時段分佈分析 (橫條圖) */}
            <h3 className="text-sm font-bold text-slate-700 mb-3 border-b pb-2 flex items-center">
              <Clock className="w-4 h-4 mr-2 text-slate-400" />哪個時段最常發生？ (作息偏好)
            </h3>
            <div className="space-y-3 mb-8">
              {[
                { label: '凌晨 (00-06)', count: stats.timeOfDay.counts[0], color: 'bg-slate-700' },
                { label: '早上 (06-12)', count: stats.timeOfDay.counts[1], color: 'bg-amber-400' },
                { label: '下午 (12-18)', count: stats.timeOfDay.counts[2], color: 'bg-orange-400' },
                { label: '晚上 (18-24)', count: stats.timeOfDay.counts[3], color: 'bg-indigo-500' }
              ].map(period => {
                const width = stats.timeOfDay.max > 0 ? (period.count / stats.timeOfDay.max) * 100 : 0;
                const isMax = period.count === stats.timeOfDay.max && period.count > 0;
                return (
                  <div key={period.label} className="relative">
                    <div className="flex justify-between text-xs mb-1">
                      <span className={`font-medium ${isMax ? 'text-slate-800 font-bold' : 'text-slate-500'}`}>{period.label}</span>
                      <span className="text-slate-600">{period.count} 次</span>
                    </div>
                    <div className="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
                      <div className={`h-full ${period.color} rounded-full transition-all duration-700 ease-out`} style={{ width: `${width}%` }}></div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* 5. 歷史統計 */}
            <h3 className="text-sm font-bold text-slate-700 mb-3 border-b pb-2">各年份歷史統計</h3>
            <div className="space-y-3">
              {stats.yearlyStats.length > 0 ? (
                stats.yearlyStats.map(item => (
                  <div key={item.year} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                    <span className="text-slate-700 font-medium">{item.year} 年</span>
                    <span className="text-indigo-600 font-bold">{item.count} <span className="text-sm font-normal text-slate-400">次</span></span>
                  </div>
                ))
              ) : <p className="text-slate-400 text-sm text-center py-2">尚無紀錄</p>}
            </div>
          </div>
        </div>
      );

      const renderSettings = () => (
        <div className="space-y-6 animate-[fadeIn_0.5s_ease-out] pb-20">
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h2 className="text-xl font-bold text-slate-800 mb-2 flex items-center">
              <Settings className="w-6 h-6 mr-2 text-slate-700" />
              雲端同步設定
            </h2>
            <div className="mb-6">
              <textarea value={apiUrl} onChange={(e) => setApiUrl(e.target.value)} placeholder="https://script.google.com/macros/s/..." className="w-full h-20 bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-700 outline-none focus:border-indigo-500 resize-none"></textarea>
              <button onClick={() => { localStorage.setItem('tracker_api_url', apiUrl); forceSyncImplementation(); }} className="mt-2 w-full bg-slate-800 text-white py-3 rounded-xl font-medium shadow-sm hover:bg-slate-700">儲存並連線</button>
            </div>
            
            <div className="space-y-3 mb-6">
              <button onClick={forceSyncImplementation} className="w-full bg-indigo-50 text-indigo-700 border border-indigo-200 py-3 rounded-xl font-medium hover:bg-indigo-100 transition-colors">自動雙向合併同步</button>
            </div>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h2 className="text-xl font-bold text-slate-800 mb-2 flex items-center">
              <Upload className="w-6 h-6 mr-2 text-slate-700" />進階同步操作
            </h2>
            <p className="text-xs text-slate-500 mb-4 leading-relaxed">如果您換了新設備，或是需要重置資料，可以使用以下強制覆蓋功能。請注意，這些操作 <strong className="text-orange-500">無法復原</strong>。</p>
            <div className="space-y-3">
              <button 
                onClick={overwriteLocalWithCloud} 
                className="w-full bg-orange-50 text-orange-700 border border-orange-200 py-3 rounded-xl font-medium flex items-center justify-center gap-2 hover:bg-orange-100 transition-colors"
              >
                <AlertCircle className="w-5 h-5" /> 下載雲端，強制覆蓋本地
              </button>
              <button 
                onClick={overwriteCloudWithLocal} 
                className="w-full bg-orange-50 text-orange-700 border border-orange-200 py-3 rounded-xl font-medium flex items-center justify-center gap-2 hover:bg-orange-100 transition-colors"
              >
                <AlertCircle className="w-5 h-5" /> 上傳本地，強制覆蓋雲端
              </button>
            </div>
          </div>
          
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h2 className="text-xl font-bold text-slate-800 mb-2">批次匯入舊紀錄</h2>
            <div className="space-y-3">
              <input type="number" value={importYear} onChange={(e) => setImportYear(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2" placeholder="年份" />
              <textarea value={importData} onChange={(e) => setImportData(e.target.value)} placeholder="03/19 19:06" className="w-full h-24 bg-slate-50 border border-slate-200 rounded-xl p-3"></textarea>
              <button onClick={() => {
                // 簡易匯入邏輯 (與前版相同)
                const lines = importData.split('\n'); let sc=0; const nr=[];
                lines.forEach(l => {
                  const m = l.trim().match(/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{1,2})/);
                  if(m) {
                    const d = new Date(importYear, m[1]-1, m[2], m[3], m[4]);
                    if(!isNaN(d.getTime())) { nr.push({id:crypto.randomUUID(), timestamp:d.getTime()}); sc++; }
                  }
                });
                if(sc>0){
                  const ur=[...records, ...nr].sort((a,b)=>b.timestamp-a.timestamp);
                  setRecords(ur); localStorage.setItem('tracker_records', JSON.stringify(ur)); setImportData(''); alert(`成功匯入 ${sc} 筆`);
                }
              }} className="w-full bg-slate-800 text-white py-3 rounded-xl font-medium">執行匯入</button>
            </div>
          </div>

          <div className="bg-red-50 p-6 rounded-3xl shadow-sm border border-red-100">
            <h2 className="text-lg font-bold text-red-700 mb-2 flex items-center"><AlertTriangle className="w-5 h-5 mr-2" />危險操作區</h2>
            <div className="flex gap-3 mt-4">
              <select value={selectedDeleteYear} onChange={(e) => setSelectedDeleteYear(e.target.value)} className="flex-1 bg-white border border-red-200 rounded-xl px-4 py-2">
                <option value="">選擇刪除年份...</option>
                {availableYears.map(y => <option key={y} value={y}>{y} 年</option>)}
              </select>
              <button onClick={() => {
                if(!selectedDeleteYear) return;
                if(!window.confirm(`確定刪除 ${selectedDeleteYear} 年所有紀錄？`)) return;
                const ur = records.filter(r => new Date(r.timestamp).getFullYear() !== parseInt(selectedDeleteYear));
                setRecords(ur); localStorage.setItem('tracker_records', JSON.stringify(ur)); setSelectedDeleteYear('');
              }} className="bg-red-600 text-white px-5 rounded-xl font-medium">刪除</button>
            </div>
          </div>
        </div>
      );

      if (isLoading) return <div className="min-h-screen flex items-center justify-center bg-slate-50 text-slate-500">載入中...</div>;

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-900 max-w-md mx-auto relative shadow-2xl overflow-hidden">
          <header className="bg-white px-6 py-5 sticky top-0 z-10 border-b border-slate-100 flex justify-between items-center">
            <div>
              <h1 className="text-xl font-black text-slate-800 tracking-tight">個人紀錄小幫手</h1>
            </div>
            <div className="flex items-center gap-2">
               {syncStatus === 'syncing' ? <RefreshCw className="w-5 h-5 text-indigo-400 animate-spin" /> : <div className="w-2 h-2 rounded-full bg-slate-200"></div>}
            </div>
          </header>

          <main className="p-4 overflow-y-auto h-[calc(100vh-80px)] no-scrollbar">
            {activeTab === 'home' && renderHome()}
            {activeTab === 'stats' && renderStats()}
            {activeTab === 'settings' && renderSettings()}
          </main>

          <nav className="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 flex justify-around items-center pb-safe pt-2 px-2 z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.03)]">
            <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center p-3 w-20 rounded-2xl ${activeTab === 'home' ? 'text-indigo-600 font-bold' : 'text-slate-400'}`}>
              <Home className={`w-6 h-6 mb-1 ${activeTab === 'home' ? 'fill-indigo-50' : ''}`} /><span className="text-[10px]">首頁</span>
            </button>
            <button onClick={() => setActiveTab('stats')} className={`flex flex-col items-center p-3 w-20 rounded-2xl ${activeTab === 'stats' ? 'text-indigo-600 font-bold' : 'text-slate-400'}`}>
              <BarChart3 className={`w-6 h-6 mb-1 ${activeTab === 'stats' ? 'fill-indigo-50' : ''}`} /><span className="text-[10px]">數據</span>
            </button>
            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center p-3 w-20 rounded-2xl ${activeTab === 'settings' ? 'text-indigo-600 font-bold' : 'text-slate-400'}`}>
              <Settings className={`w-6 h-6 mb-1 ${activeTab === 'settings' ? 'fill-indigo-50' : ''}`} /><span className="text-[10px]">設定</span>
            </button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
