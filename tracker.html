<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人紀錄小幫手 - 進階版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- 圖示組件 ---
    const SvgIcon = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Clock = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></SvgIcon>;
    const Activity = (p) => <SvgIcon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></SvgIcon>;
    const Settings = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></SvgIcon>;
    const Plus = (p) => <SvgIcon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></SvgIcon>;
    const RotateCcw = (p) => <SvgIcon {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></SvgIcon>;
    const Trash2 = (p) => <SvgIcon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></SvgIcon>;
    const RefreshCw = (p) => <SvgIcon {...p}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></SvgIcon>;
    const CheckCircle = (p) => <SvgIcon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></SvgIcon>;
    const AlertCircle = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></SvgIcon>;
    const BarChart3 = (p) => <SvgIcon {...p}><path d="M3 3v18h18"/><rect x="7" y="14" width="4" height="5" rx="1"/><rect x="15" y="7" width="4" height="12" rx="1"/></SvgIcon>;
    const Home = (p) => <SvgIcon {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></SvgIcon>;
    const DownloadCloud = (p) => <SvgIcon {...p}><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></SvgIcon>;

    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [records, setRecords] = useState([]);
      const [apiUrl, setApiUrl] = useState('');
      const [syncStatus, setSyncStatus] = useState('idle');
      const [customDate, setCustomDate] = useState('');
      const [isLoading, setIsLoading] = useState(true);

      useEffect(() => {
        const savedUrl = localStorage.getItem('tracker_api_url');
        const savedRecords = localStorage.getItem('tracker_records');
        if (savedUrl) setApiUrl(savedUrl);
        if (savedRecords) setRecords(JSON.parse(savedRecords));
        setIsLoading(false);
      }, []);

      // 同步到雲端
      const syncToCloud = async (currentRecords) => {
        if (!apiUrl) return;
        setSyncStatus('syncing');
        try {
          await fetch(apiUrl, {
            method: 'POST',
            body: JSON.stringify(currentRecords),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
          });
          setSyncStatus('success');
          setTimeout(() => setSyncStatus('idle'), 3000);
        } catch (e) {
          setSyncStatus('error');
        }
      };

      // 從雲端抓取 (可選是否強制覆蓋)
      const fetchFromCloud = async (forceOverwrite = false) => {
        if (!apiUrl) return alert('請先設定 API 網址');
        setSyncStatus('syncing');
        try {
          const res = await fetch(apiUrl);
          const data = await res.json();
          if (Array.isArray(data)) {
            let finalRecords;
            if (forceOverwrite) {
              if(!confirm('確定要「強制覆蓋」嗎？這將會清除目前手機上所有與雲端不符的變更。')) {
                setSyncStatus('idle');
                return;
              }
              finalRecords = data;
            } else {
              // 合併邏輯
              const localIds = new Set(records.map(r => r.id));
              finalRecords = [...records];
              data.forEach(cloudR => { if(!localIds.has(cloudR.id)) finalRecords.push(cloudR); });
            }
            const sorted = finalRecords.sort((a,b) => b.timestamp - a.timestamp);
            setRecords(sorted);
            localStorage.setItem('tracker_records', JSON.stringify(sorted));
            setSyncStatus('success');
          }
        } catch (e) {
          setSyncStatus('error');
        }
      };

      const addRecord = (timeMs) => {
        const hasRecent = records.some(r => Math.abs(r.timestamp - timeMs) < 3600000);
        if (hasRecent && !confirm('一小時內已有紀錄，確定新增？')) return;
        const newRecord = { id: crypto.randomUUID(), timestamp: timeMs };
        const updated = [newRecord, ...records].sort((a,b) => b.timestamp - a.timestamp);
        setRecords(updated);
        localStorage.setItem('tracker_records', JSON.stringify(updated));
        syncToCloud(updated);
      };

      const deleteRecord = (id) => {
        if (!confirm('確定刪除？')) return;
        const updated = records.filter(r => r.id !== id);
        setRecords(updated);
        localStorage.setItem('tracker_records', JSON.stringify(updated));
        syncToCloud(updated);
      };

      // 按年份刪除 (二次確認)
      const deleteYearlyRecords = (year) => {
        if (confirm(`⚠️ 確定要刪除 ${year} 年的所有紀錄嗎？`)) {
          if (confirm(`‼️ 警告：此操作將刪除 ${year} 年所有資料且無法復原，您真的確定嗎？`)) {
            const updated = records.filter(r => new Date(r.timestamp).getFullYear() !== parseInt(year));
            setRecords(updated);
            localStorage.setItem('tracker_records', JSON.stringify(updated));
            syncToCloud(updated);
            alert(`${year} 年資料已清除`);
          }
        }
      };

      const stats = useMemo(() => {
        const now = new Date();
        const sorted = [...records].sort((a,b) => a.timestamp - b.timestamp);
        const years = [...new Set(records.map(r => new Date(r.timestamp).getFullYear()))].sort((a,b) => b-a);
        
        let avgIntervalDays = 0;
        if (sorted.length > 1) {
          const totalSpan = sorted[sorted.length-1].timestamp - sorted[0].timestamp;
          avgIntervalDays = (totalSpan / (sorted.length - 1)) / 86400000;
        }

        const timeSinceLast = records.length > 0 ? now.getTime() - records[0].timestamp : 0;

        return {
          total: records.length,
          avgIntervalDays: avgIntervalDays.toFixed(1),
          currentStreak: (timeSinceLast / 86400000).toFixed(1),
          years
        };
      }, [records]);

      const renderHome = () => (
        <div className="space-y-6 animate-[fadeIn_0.4s_ease-out]">
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center"><Clock className="w-5 h-5 mr-2 text-indigo-500" />快速紀錄</h2>
            <div className="grid grid-cols-2 gap-3 mb-4">
              <button onClick={() => addRecord(Date.now())} className="bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 active:scale-95 transition-all flex flex-col items-center"><Plus className="w-6 h-6 mb-1"/>現在</button>
              <button onClick={() => addRecord(Date.now() - 300000)} className="bg-slate-800 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all flex flex-col items-center"><RotateCcw className="w-6 h-6 mb-1"/>5分鐘前</button>
            </div>
            <div className="flex gap-2 pt-4 border-t border-slate-50">
              <input type="datetime-local" value={customDate} onChange={e => setCustomDate(e.target.value)} className="flex-1 bg-slate-50 border-none rounded-xl px-3 text-sm" />
              <button onClick={() => { if(!customDate) return; addRecord(new Date(customDate).getTime()); setCustomDate(''); }} className="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold text-sm">補登</button>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <div className="bg-gradient-to-br from-indigo-500 to-indigo-600 p-5 rounded-3xl text-white shadow-lg">
              <p className="opacity-80 text-xs font-bold mb-1">已堅持</p>
              <div className="text-3xl font-black">{stats.currentStreak} <span className="text-sm font-normal">天</span></div>
            </div>
            <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
              <p className="text-slate-400 text-xs font-bold mb-1">歷史總計</p>
              <div className="text-3xl font-black text-slate-800">{stats.total} <span className="text-sm font-normal text-slate-400">次</span></div>
            </div>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-24">
            <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center"><Activity className="w-5 h-5 mr-2 text-teal-500" />近期紀錄</h2>
            <div className="space-y-3">
              {records.slice(0, 5).map(r => (
                <div key={r.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                  <div>
                    <p className="text-slate-800 font-bold">{new Date(r.timestamp).toLocaleDateString()}</p>
                    <p className="text-slate-400 text-xs">{new Date(r.timestamp).toLocaleTimeString()}</p>
                  </div>
                  <button onClick={() => deleteRecord(r.id)} className="text-slate-300 hover:text-red-400 p-2 transition-colors"><Trash2 className="w-5 h-5"/></button>
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      const renderSettings = () => (
        <div className="space-y-6 animate-[fadeIn_0.4s_ease-out] pb-24">
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center"><Settings className="w-5 h-5 mr-2 text-slate-400" />同步與設定</h2>
            
            <label className="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">Google Script API 網址</label>
            <textarea value={apiUrl} onChange={e => setApiUrl(e.target.value)} className="w-full h-20 bg-slate-50 rounded-2xl p-3 text-sm border-none focus:ring-2 focus:ring-indigo-100 mb-3" placeholder="貼上網址..."></textarea>
            
            <div className="grid grid-cols-2 gap-3 mb-6">
              <button onClick={() => { localStorage.setItem('tracker_api_url', apiUrl); alert('儲存成功'); fetchFromCloud(false); }} className="bg-slate-800 text-white py-3 rounded-xl font-bold text-sm">儲存設定</button>
              <button onClick={() => fetchFromCloud(true)} className="bg-amber-500 text-white py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-1"><DownloadCloud className="w-4 h-4"/>強制覆蓋</button>
            </div>

            <div className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl mb-8">
              <span className="text-xs font-bold text-slate-500">同步狀態</span>
              <span className={`text-xs font-bold ${syncStatus==='success'?'text-emerald-500':syncStatus==='error'?'text-red-500':'text-indigo-500'}`}>
                {syncStatus==='syncing'?'同步中...':syncStatus==='success'?'連線正常':syncStatus==='error'?'連線失敗':'待機中'}
              </span>
            </div>

            <h3 className="text-sm font-bold text-slate-800 mb-3 border-t pt-6">資料管理 (按年份刪除)</h3>
            <div className="space-y-2">
              {stats.years.map(year => (
                <div key={year} className="flex justify-between items-center p-3 bg-red-50 rounded-xl">
                  <span className="font-bold text-red-700">{year} 年紀錄</span>
                  <button onClick={() => deleteYearlyRecords(year)} className="text-xs bg-red-600 text-white px-3 py-1.5 rounded-lg font-bold shadow-sm active:scale-95">整年刪除</button>
                </div>
              ))}
              {stats.years.length === 0 && <p className="text-slate-400 text-xs text-center py-4">尚無可管理的年份資料</p>}
            </div>
          </div>
        </div>
      );

      if (isLoading) return <div className="h-screen flex items-center justify-center text-slate-400 font-bold">載入中...</div>;

      return (
        <div className="max-w-md mx-auto min-h-screen relative bg-slate-50">
          <header className="p-6 pb-2">
            <h1 className="text-2xl font-black text-slate-900 tracking-tighter">小幫手 <span className="text-indigo-600">PRO</span></h1>
          </header>

          <main className="px-4 py-2">
            {activeTab === 'home' && renderHome()}
            {activeTab === 'settings' && renderSettings()}
          </main>

          <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[360px] bg-white/80 backdrop-blur-xl border border-white rounded-full shadow-2xl flex justify-around p-2 z-50">
            <button onClick={() => setActiveTab('home')} className={`p-4 rounded-full transition-all ${activeTab==='home'?'bg-indigo-600 text-white shadow-lg shadow-indigo-200': 'text-slate-400'}`}><Home className="w-6 h-6"/></button>
            <button onClick={() => setActiveTab('settings')} className={`p-4 rounded-full transition-all ${activeTab==='settings'?'bg-indigo-600 text-white shadow-lg shadow-indigo-200': 'text-slate-400'}`}><Settings className="w-6 h-6"/></button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
