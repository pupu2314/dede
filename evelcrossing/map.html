<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平交道資訊查詢 - 互動地圖版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        /* 地圖樣式自訂 */
        #map {
            height: 400px;
            border-radius: 1.5rem;
            border: 2px solid rgba(74, 85, 104, 0.5);
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .header-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .scroll-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100px);
            opacity: 0;
            cursor: pointer;
            z-index: 1000;
        }
        
        .scroll-to-top.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* 讓 Popup 更符合深色主題 */
        .leaflet-popup-content-wrapper {
            background: #2d3748 !important;
            color: #f7fafc !important;
            border-radius: 0.75rem !important;
        }
        .leaflet-popup-tip {
            background: #2d3748 !important;
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-7xl mx-auto pb-20">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl sm:text-6xl font-extrabold mb-4 header-gradient">
                平交道資訊查詢
            </h1>
            <p class="text-gray-400 text-lg">整合經緯度圖標與自動化條件篩選</p>
        </div>
        
        <!-- 搜尋與篩選面板 -->
        <div class="bg-gray-800/60 backdrop-blur-md p-6 rounded-3xl shadow-2xl mb-8 border border-gray-700/50">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-semibold text-indigo-300 mb-2 ml-1">🔍 名稱或編號搜尋</label>
                    <input type="text" id="search-input" placeholder="例如：成功路..." class="w-full px-5 py-4 bg-gray-900/50 text-white rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-gray-700 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-indigo-300 mb-2 ml-1">📍 所在縣市</label>
                    <select id="city-filter" class="w-full px-5 py-4 bg-gray-900/50 text-white rounded-2xl border border-gray-700 cursor-pointer focus:ring-2 focus:ring-indigo-500 appearance-none">
                        <option value="">全部縣市</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-2 ml-1">電務段</label>
                    <select id="electric-filter" class="w-full px-4 py-3 bg-gray-900/30 text-gray-300 rounded-xl border border-gray-700 cursor-pointer appearance-none">
                        <option value="">全部</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-2 ml-1">路線別</label>
                    <select id="line-filter" class="w-full px-4 py-3 bg-gray-900/30 text-gray-300 rounded-xl border border-gray-700 cursor-pointer appearance-none">
                        <option value="">全部</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-2 ml-1">種類</label>
                    <select id="type-filter" class="w-full px-4 py-3 bg-gray-900/30 text-gray-300 rounded-xl border border-gray-700 cursor-pointer appearance-none">
                        <option value="">全部</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-between items-center mt-6 pt-6 border-t border-gray-700/50">
                <span id="results-count" class="text-indigo-400 font-medium">載入中...</span>
                <button id="reset-btn" class="text-gray-400 hover:text-white transition-colors text-sm flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    重設所有篩選
                </button>
            </div>
        </div>

        <!-- 互動地圖 -->
        <div class="mb-10">
            <div id="map"></div>
        </div>

        <!-- 結果卡片 -->
        <div id="results-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <!-- 提示訊息 -->
        <div id="status-message" class="text-center py-20 hidden">
            <p class="text-gray-500 text-xl font-medium">沒有符合搜尋條件的平交道</p>
        </div>
    </div>

    <!-- 浮動按鈕 -->
    <div id="scroll-to-top" class="scroll-to-top">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" /></svg>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let fullData = [];
        let map, markerGroup;

        // --- 地圖初始化 ---
        function initMap() {
            // 預設中心點在台灣
            map = L.map('map').setView([23.6, 121.0], 7);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);

            markerGroup = L.layerGroup().addTo(map);
        }

        // --- 核心功能：從 Google 地圖 URL 解析經緯度 ---
        function parseLatLngFromUrl(url) {
            if (!url) return null;
            // 比對 query=25.xxxx,121.xxxx 格式
            const regex = /query=([-+]?\d*\.\d+|\d+),([-+]?\d*\.\d+|\d+)/;
            const match = url.match(regex);
            if (match && match.length >= 3) {
                return [parseFloat(match[1]), parseFloat(match[2])];
            }
            return null;
        }

        // --- 渲染地圖標記 ---
        function updateMapMarkers(data) {
            markerGroup.clearLayers();
            const bounds = [];

            data.forEach(item => {
                const latlng = parseLatLngFromUrl(item['Google地圖']);
                if (latlng) {
                    const marker = L.circleMarker(latlng, {
                        radius: 8,
                        fillColor: "#6366f1",
                        color: "#fff",
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    });

                    marker.bindPopup(`
                        <div class="font-sans">
                            <h4 class="font-bold text-lg mb-1">${item['平交道名稱']}</h4>
                            <p class="text-xs text-gray-400 mb-2">${item['編號']} | ${item['路線別']}</p>
                            <p class="text-sm">區間：${item['區間']}</p>
                            <a href="${item['Google地圖']}" target="_blank" class="block mt-2 text-center bg-indigo-500 text-white py-1 rounded-md text-xs">開啟 Google 地圖導航</a>
                        </div>
                    `);

                    marker.addTo(markerGroup);
                    bounds.push(latlng);
                }
            });

            // 如果有資料且超過 1 筆，則自動縮放地圖視角
            if (bounds.length > 0) {
                if (bounds.length === 1) {
                    map.setView(bounds[0], 15);
                } else {
                    map.fitBounds(L.latLngBounds(bounds), { padding: [50, 50], maxZoom: 14 });
                }
            }
        }

        // --- UI 渲染與篩選邏輯 ---
        const searchInput = document.getElementById('search-input');
        const cityFilter = document.getElementById('city-filter');
        const electricFilter = document.getElementById('electric-filter');
        const lineFilter = document.getElementById('line-filter');
        const typeFilter = document.getElementById('type-filter');
        const resultsGrid = document.getElementById('results-grid');
        const resultsCountText = document.getElementById('results-count');
        const statusMsg = document.getElementById('status-message');

        function populateSelects(data) {
            const getUnique = (key) => [...new Set(data.map(i => i[key]))].filter(Boolean).sort();
            
            const fill = (el, items) => {
                const current = el.value;
                el.innerHTML = '<option value="">全部</option>' + items.map(v => `<option value="${v}">${v}</option>`).join('');
                el.value = current;
            };

            fill(cityFilter, getUnique('所在縣市'));
            fill(electricFilter, getUnique('電務段'));
            fill(lineFilter, getUnique('路線別'));
            fill(typeFilter, getUnique('平交道種類'));
        }

        function filterData() {
            const query = searchInput.value.toLowerCase();
            const city = cityFilter.value;
            const electric = electricFilter.value;
            const line = lineFilter.value;
            const type = typeFilter.value;

            const filtered = fullData.filter(item => {
                const matchSearch = item['平交道名稱'].toLowerCase().includes(query) || item['編號'].toString().includes(query);
                const matchCity = !city || item['所在縣市'] === city;
                const matchElectric = !electric || item['電務段'] === electric;
                const matchLine = !line || item['路線別'] === line;
                const matchType = !type || item['平交道種類'] === type;
                return matchSearch && matchCity && matchElectric && matchLine && matchType;
            });

            renderGrid(filtered);
            updateMapMarkers(filtered);
        }

        function renderGrid(data) {
            resultsGrid.innerHTML = '';
            resultsCountText.textContent = `找到 ${data.length} 個平交道`;
            
            if (data.length === 0) {
                statusMsg.classList.remove('hidden');
            } else {
                statusMsg.classList.add('hidden');
                // 為了效能，卡片只顯示前 60 筆，地圖則顯示全部
                data.slice(0, 60).forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'bg-gray-800/40 border border-gray-700/50 p-6 rounded-2xl hover:border-indigo-500/50 transition-all group';
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-xs font-bold text-indigo-400 tracking-wider uppercase">${item['編號']}</span>
                                <h3 class="text-xl font-bold text-white group-hover:text-indigo-300 transition-colors">${item['平交道名稱']}</h3>
                            </div>
                            <span class="px-2 py-1 bg-gray-700 text-gray-300 text-[10px] rounded">${item['平交道種類']}</span>
                        </div>
                        <div class="space-y-2 text-sm text-gray-400">
                            <p class="flex items-center gap-2">📍 ${item['所在縣市']} (${item['區間']})</p>
                            <p class="flex items-center gap-2">🛤️ ${item['路線別']} | 里程：${item['里程']}</p>
                        </div>
                        <div class="mt-6 flex gap-2">
                            <a href="${item['Google地圖']}" target="_blank" class="flex-1 text-center py-2 bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 rounded-xl text-sm font-medium transition-all">地圖導航</a>
                            <button onclick="zoomToMarker('${item['平交道名稱']}')" class="px-3 py-2 bg-gray-700/50 hover:bg-gray-700 text-white rounded-xl text-sm">定位</button>
                        </div>
                    `;
                    resultsGrid.appendChild(card);
                });
            }
        }

        // 定位按鈕功能
        window.zoomToMarker = (name) => {
            const item = fullData.find(i => i['平交道名稱'] === name);
            const latlng = parseLatLngFromUrl(item['Google地圖']);
            if (latlng) {
                map.setView(latlng, 18);
                window.scrollTo({ top: document.getElementById('map').offsetTop - 20, behavior: 'smooth' });
            }
        };

        // 事件監聽
        [searchInput, cityFilter, electricFilter, lineFilter, typeFilter].forEach(el => {
            el.addEventListener(el.tagName === 'INPUT' ? 'input' : 'change', filterData);
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            searchInput.value = '';
            cityFilter.value = '';
            electricFilter.value = '';
            lineFilter.value = '';
            typeFilter.value = '';
            filterData();
        });

        // 頁面載入
        window.addEventListener('load', () => {
            initMap();
            fetch('evelcrossing.json')
                .then(res => res.json())
                .then(data => {
                    fullData = data;
                    populateSelects(data);
                    renderGrid(data);
                    updateMapMarkers(data);
                })
                .catch(err => {
                    resultsCountText.textContent = '資料載入失敗';
                    console.error(err);
                });
        });

        // 滾動按鈕邏輯
        const scrollBtn = document.getElementById('scroll-to-top');
        window.onscroll = () => scrollBtn.classList.toggle('show', window.scrollY > 400);
        scrollBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
    </script>
</body>
</html>
