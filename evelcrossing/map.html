<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平交道資訊查詢 - 戶外強化版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }
        
        /* 滾動時置頂的篩選區 */
        .sticky-filter {
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid transparent;
        }

        .sticky-filter.scrolled {
            padding: 0.75rem 0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border-bottom: 1px solid #e2e8f0;
        }

        .sticky-filter.scrolled .header-hide {
            display: none;
        }

        .sticky-filter.scrolled .grid-cols-5 {
            gap: 0.5rem;
        }

        /* 地圖區域 */
        #map-container {
            height: 0;
            overflow: hidden;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 0;
        }

        #map-container.active {
            height: 400px;
            margin-bottom: 2rem;
        }

        #map {
            height: 100%;
            width: 100%;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
        }

        .scroll-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 3rem;
            height: 3rem;
            background-color: var(--primary);
            color: white;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            transition: all 0.3s;
            transform: translateY(100px);
            opacity: 0;
            cursor: pointer;
            z-index: 1000;
        }
        
        .scroll-to-top.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* 卡片內容樣式保持 */
        .crossing-card {
            background: white;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .crossing-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        select, input {
            border: 1px solid #cbd5e1;
            background-color: #ffffff;
        }
    </style>
</head>
<body class="pb-10">

    <!-- 頂部標題 (滾動後隱藏) -->
    <header class="pt-8 pb-4 text-center header-hide">
        <h1 class="text-3xl font-bold text-slate-800">平交道資訊查詢</h1>
        <p class="text-slate-500 text-sm mt-1">全台灣平交道位置與詳細資訊</p>
    </header>

    <!-- 篩選控制區 (滾動後置頂) -->
    <div id="filter-section" class="sticky-filter px-4 sm:px-8 py-4">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col gap-3">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="搜尋平交道名稱、編號..." class="w-full px-4 py-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-5 gap-2">
                    <select id="electric-filter" class="px-2 py-2 rounded-lg text-xs outline-none focus:border-blue-500"><option value="">所有電務段</option></select>
                    <select id="station-filter" class="px-2 py-2 rounded-lg text-xs outline-none focus:border-blue-500"><option value="">所有分駐所</option></select>
                    <select id="city-filter" class="px-2 py-2 rounded-lg text-xs outline-none focus:border-blue-500"><option value="">所有縣市</option></select>
                    <select id="section-filter" class="px-2 py-2 rounded-lg text-xs outline-none focus:border-blue-500"><option value="">所有區間</option></select>
                    <select id="line-filter" class="px-2 py-2 rounded-lg text-xs outline-none focus:border-blue-500"><option value="">所有路線</option></select>
                </div>

                <div class="flex justify-between items-center text-xs">
                    <div id="results-count" class="text-slate-500 font-medium font-mono uppercase">載入資料中...</div>
                    <div class="flex gap-2">
                        <button id="toggle-map-btn" class="px-3 py-1 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded flex items-center gap-1 transition-colors">
                            <span id="map-btn-text">顯示地圖</span>
                        </button>
                        <button id="clear-filters-btn" class="px-3 py-1 text-red-500 hover:bg-red-50 hidden transition-all">清除篩選</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-8 mt-4">
        <!-- 地圖容器 (預設隱藏) -->
        <div id="map-container">
            <div id="map"></div>
        </div>

        <!-- 卡片清單 -->
        <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- 卡片會由 JS 動態生成 -->
        </div>

        <div id="loading-message" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
        </div>

        <div id="no-results" class="hidden text-center py-20 text-slate-400">
            找不到符合條件的平交道
        </div>
    </main>

    <div id="scroll-to-top" class="scroll-to-top">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" /></svg>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let fullCrossingData = [];
        let map, markerGroup;
        let isMapInitialized = false;

        // --- 1. 從 URL 解析座標 ---
        function parseLatLng(url) {
            if (!url) return null;
            const match = url.match(/query=([-+]?\d*\.\d+|\d+),([-+]?\d*\.\d+|\d+)/);
            return match ? [parseFloat(match[1]), parseFloat(match[2])] : null;
        }

        // --- 2. 地圖操作 ---
        function initMap() {
            if (isMapInitialized) return;
            map = L.map('map').setView([23.6, 121.0], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OSM'
            }).addTo(map);
            markerGroup = L.layerGroup().addTo(map);
            isMapInitialized = true;
        }

        function updateMarkers(data) {
            if (!isMapInitialized) return;
            markerGroup.clearLayers();
            const bounds = [];
            data.forEach(item => {
                const ll = parseLatLng(item['Google地圖']);
                if (ll) {
                    L.marker(ll).addTo(markerGroup).bindPopup(`<b>${item['平交道名稱']}</b><br>${item['編號']}`);
                    bounds.push(ll);
                }
            });
            if (bounds.length > 0) map.fitBounds(bounds, { padding: [30, 30], maxZoom: 15 });
        }

        // --- 3. UI 邏輯 ---
        const searchInput = document.getElementById('search-input');
        const filters = ['electric', 'station', 'city', 'section', 'line'].map(id => document.getElementById(`${id}-filter`));
        const [electricF, stationF, cityF, sectionF, lineF] = filters;
        const resultsGrid = document.getElementById('results-grid');
        const mapContainer = document.getElementById('map-container');
        const mapBtn = document.getElementById('toggle-map-btn');
        const mapBtnText = document.getElementById('map-btn-text');

        // 切換地圖顯示/隱藏
        mapBtn.onclick = () => {
            const isActive = mapContainer.classList.toggle('active');
            mapBtnText.textContent = isActive ? '隱藏地圖' : '顯示地圖';
            if (isActive) {
                setTimeout(() => {
                    initMap();
                    map.invalidateSize();
                    filterAndRender();
                }, 400);
            }
        };

        function filterAndRender() {
            const query = searchInput.value.toLowerCase();
            const vals = filters.map(f => f.value);

            const filtered = fullCrossingData.filter(item => {
                const searchMatch = item['平交道名稱'].toLowerCase().includes(query) || item['編號'].toString().includes(query);
                return searchMatch &&
                       (!vals[0] || item['電務段'] === vals[0]) &&
                       (!vals[1] || item['分駐所'] === vals[1]) &&
                       (!vals[2] || item['所在縣市'] === vals[2]) &&
                       (!vals[3] || item['區間'] === vals[3]) &&
                       (!vals[4] || item['路線別'] === vals[4]);
            });

            renderGrid(filtered);
            if (mapContainer.classList.contains('active')) updateMarkers(filtered);
            
            document.getElementById('results-count').textContent = `FOUND: ${filtered.length}`;
            document.getElementById('clear-filters-btn').classList.toggle('hidden', !query && !vals.some(v => v));
        }

        function renderGrid(data) {
            resultsGrid.innerHTML = '';
            document.getElementById('loading-message').classList.add('hidden');
            document.getElementById('no-results').classList.toggle('hidden', data.length > 0);

            data.slice(0, 100).forEach(item => {
                const card = document.createElement('div');
                card.className = 'crossing-card p-4 rounded-xl flex flex-col justify-between';
                
                // 保持原本的卡片資訊內容
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-bold text-blue-600 px-2 py-0.5 bg-blue-50 rounded">${item['編號']}</span>
                            <span class="text-[10px] text-slate-400 font-mono">${item['里程']}</span>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 mb-1">${item['平交道名稱']}</h3>
                        <div class="grid grid-cols-2 gap-y-1 text-xs text-slate-500 mb-4">
                            <p>分駐所: ${item['分駐所']}</p>
                            <p>縣市: ${item['所在縣市']}</p>
                            <p>區間: ${item['區間']}</p>
                            <p>種類: ${item['平交道種類']}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 border-t pt-3 mt-auto">
                        <a href="${item['Google地圖']}" target="_blank" class="flex-1 text-center py-2 bg-blue-600 text-white rounded-lg text-xs font-semibold">地圖導航</a>
                        <button onclick="zoomToMarker('${item['平交道名稱']}')" class="px-3 py-2 bg-slate-100 text-slate-600 rounded-lg text-xs font-semibold">定位</button>
                    </div>
                `;
                resultsGrid.appendChild(card);
            });
        }

        window.zoomToMarker = (name) => {
            if (!mapContainer.classList.contains('active')) mapBtn.click();
            const item = fullCrossingData.find(i => i['平交道名稱'] === name);
            const ll = parseLatLng(item['Google地圖']);
            if (ll) {
                setTimeout(() => {
                    map.setView(ll, 18);
                    window.scrollTo({ top: mapContainer.offsetTop - 80, behavior: 'smooth' });
                }, 500);
            }
        };

        function populateFilters(data) {
            const keys = ['電務段', '分駐所', '所在縣市', '區間', '路線別'];
            filters.forEach((f, i) => {
                const opts = [...new Set(data.map(d => d[keys[i]]))].filter(Boolean).sort();
                f.innerHTML = `<option value="">所有${keys[i]}</option>` + opts.map(o => `<option value="${o}">${o}</option>`).join('');
            });
        }

        // --- 4. 滾動與初始化 ---
        window.onscroll = () => {
            const section = document.getElementById('filter-section');
            const scrollBtn = document.getElementById('scroll-to-top');
            
            section.classList.toggle('scrolled', window.scrollY > 100);
            scrollBtn.classList.toggle('show', window.scrollY > 400);
        };

        document.getElementById('scroll-to-top').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

        searchInput.addEventListener('input', filterAndRender);
        filters.forEach(f => f.addEventListener('change', filterAndRender));
        document.getElementById('clear-filters-btn').onclick = () => {
            searchInput.value = '';
            filters.forEach(f => f.value = '');
            filterAndRender();
        };

        window.addEventListener('load', () => {
            fetch('evelcrossing.json')
                .then(r => r.json())
                .then(data => {
                    fullCrossingData = data;
                    populateFilters(data);
                    filterAndRender();
                });
        });
    </script>
</body>
</html>
