<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平交道資訊查詢與施工管理系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Leaflet 地圖的 CSS 與 JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        :root {
            /* 預設篩選列高度，會透過 JS 動態更新 */
            --filter-height: 180px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }
        
        .scroll-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100px);
            opacity: 0;
            cursor: pointer;
            z-index: 1000;
        }
        
        .scroll-to-top.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .scroll-to-top:hover {
            transform: translateY(0) scale(1.1);
            box-shadow: 0 15px 35px rgba(79, 70, 229, 0.5);
        }
        
        .deactivated-card {
            background-color: #f1f5f9 !important;
            border-color: #cbd5e1 !important;
            position: relative;
            overflow: hidden;
        }
        
        .deactivated-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(0, 0, 0, 0.03) 10px,
                rgba(0, 0, 0, 0.03) 20px
            );
            pointer-events: none;
        }
        
        .deactivated-card h2, 
        .deactivated-card .text-indigo-600 {
            color: #64748b !important;
        }
        
        .card-enter {
            animation: cardEnter 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #db2777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 根據篩選列高度動態調整地圖區塊剩餘高度 */
        #map-wrapper {
            height: calc(100vh - var(--filter-height) - 1.5rem);
            min-height: 420px;
        }

        #map-container {
            height: 100%;
            width: 100%;
            z-index: 10;
        }

        .custom-div-icon {
            background: transparent;
            border: none;
        }
        .marker-pin {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: bold;
        }
        .marker-pin:hover {
            transform: scale(1.3);
            z-index: 1000;
        }

        .map-legend {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            font-size: 0.75rem;
            line-height: 1.5;
            color: #334155;
            max-height: 280px;
            overflow-y: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            border: 1px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 8px;
        }

        /* Toast 通知動畫 */
        .toast-enter { animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .toast-leave { animation: toastOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(20px); } }

        /* Modal 動畫 */
        .modal-enter { animation: modalIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="text-slate-800 pb-16">

    <!-- 主標題區 -->
    <div id="main-title-container" class="max-w-7xl mx-auto text-center pt-8 pb-4 px-4">
        <h1 class="text-3xl sm:text-4xl font-extrabold mb-2 header-gradient">
            平交道資訊查詢系統
        </h1>
        <p id="project-subtitle" class="text-sm text-slate-500 font-medium hidden">已載入施工專案資料</p>
    </div>

    <!-- 篩選列 -->
    <div id="filter-bar" class="sticky top-0 z-40 bg-white/95 backdrop-blur-md px-4 py-2.5 sm:py-3 sm:px-8 border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto flex flex-col gap-2">
            
            <div class="flex flex-col md:flex-row gap-3 items-center justify-between w-full">
                <div class="relative w-full md:flex-1 md:w-full">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0z"></path>
                        </svg>
                    </span>
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="輸入名稱... 例: 成功路" 
                        class="w-full pl-10 pr-4 py-2 bg-slate-50 text-slate-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-slate-300 transition-all font-medium placeholder-slate-400 shadow-sm">
                </div>
                
                <div class="flex flex-row flex-wrap sm:flex-nowrap gap-2 w-full md:w-auto flex-shrink-0">
                    <button id="import-data-btn" class="flex-1 sm:flex-none whitespace-nowrap px-3 py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded-lg font-medium transition-colors flex items-center justify-center gap-1">
                        📥 匯入施工資料
                    </button>
                    <!-- 施工按鈕預設為 hidden，載入資料後才會顯示 -->
                    <button id="construction-btn" class="hidden flex-1 sm:flex-none whitespace-nowrap px-3 py-2 bg-yellow-50 hover:bg-yellow-100 text-yellow-700 border border-yellow-200 rounded-lg font-medium transition-colors flex items-center justify-center gap-1">
                        🚧 施工專案
                    </button>
                    <button id="nearby-btn" class="flex-1 sm:flex-none whitespace-nowrap px-3 py-2 bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 rounded-lg font-medium transition-colors flex items-center justify-center gap-1">
                        📍 附近平交道
                    </button>
                    <button id="toggle-view-btn" class="flex-1 sm:flex-none whitespace-nowrap px-3 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg font-medium shadow-sm transition-colors flex justify-center items-center gap-2">
                        <span>🗺️</span> <span id="toggle-view-text">地圖模式</span>
                    </button>
                </div>
            </div>

            <!-- 下拉選單 -->
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2 mt-1">
                <select id="electric-section-filter" class="w-full px-2 py-1.5 text-xs sm:text-sm bg-slate-50 text-slate-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-slate-300 cursor-pointer shadow-sm">
                    <option value="">電務段 (全部)</option>
                </select>
                <select id="station-filter" class="w-full px-2 py-1.5 text-xs sm:text-sm bg-slate-50 text-slate-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-slate-300 cursor-pointer shadow-sm">
                    <option value="">分駐所 (全部)</option>
                </select>
                <select id="city-filter" class="w-full px-2 py-1.5 text-xs sm:text-sm bg-slate-50 text-slate-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-slate-300 cursor-pointer shadow-sm">
                    <option value="">縣市 (全部)</option>
                </select>
                <select id="section-filter" class="w-full px-2 py-1.5 text-xs sm:text-sm bg-slate-50 text-slate-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-slate-300 cursor-pointer shadow-sm">
                    <option value="">區間 (全部)</option>
                </select>
                <select id="line-filter" class="w-full px-2 py-1.5 text-xs sm:text-sm bg-slate-50 text-slate-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-slate-300 cursor-pointer shadow-sm">
                    <option value="">路線 (全部)</option>
                </select>
            </div>

            <div class="flex flex-wrap items-center justify-between gap-2 mt-1 min-h-[24px]">
                <div id="active-filters" class="flex flex-wrap gap-2"></div>
                <div class="flex items-center gap-3 ml-auto">
                    <p id="results-count" class="text-xs font-semibold text-slate-500 whitespace-nowrap"></p>
                    <button id="clear-filters-btn" class="hidden text-xs font-medium text-red-500 hover:text-red-700 underline underline-offset-2">
                        清除全部
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- 主內容區塊 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-8 mt-4">
        <div id="results-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>

        <div id="map-wrapper" class="hidden w-full bg-white rounded-xl sm:rounded-2xl shadow-md border border-slate-200 overflow-hidden relative">
            <div id="map-container" class="w-full"></div>
            <div class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-white/90 backdrop-blur px-4 py-2 rounded-full shadow-md border border-slate-200 text-xs text-slate-700 font-medium z-[1000] pointer-events-none">
                📍 顯示目前篩選的平交道 (藍色標記表示您的位置)
            </div>
            <div id="map-no-results" class="hidden absolute inset-0 z-[2000] bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center">
                <div class="text-5xl mb-4">🔍</div>
                <p class="text-slate-700 text-xl font-bold">地圖上找不到符合條件的資訊</p>
                <p class="text-slate-500 text-sm mt-2">請嘗試放寬篩選條件或更改關鍵字</p>
            </div>
            <button id="recenter-btn" class="hidden absolute bottom-8 left-4 bg-white/90 backdrop-blur p-3 rounded-full shadow-lg border border-slate-200 text-indigo-600 hover:text-indigo-800 hover:bg-slate-50 z-[1000] transition-colors" title="重新置中於我的位置">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0z" />
                </svg>
            </button>
        </div>

        <div id="loading-message" class="text-center mt-16 mb-20">
            <div class="inline-block">
                <div class="flex space-x-2">
                    <div class="w-3 h-3 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                    <div class="w-3 h-3 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    <div class="w-3 h-3 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                </div>
                <p class="text-slate-500 mt-4 font-medium">資料載入中...</p>
            </div>
        </div>

        <div id="no-results-message" class="hidden text-center mt-16 mb-20">
            <div class="text-5xl mb-4">🔍</div>
            <p class="text-slate-700 text-lg font-bold">找不到符合條件的資訊</p>
            <p class="text-slate-500 text-sm mt-2">請嘗試放寬篩選條件或更改關鍵字</p>
        </div>
    </div>

    <!-- 匯入資料 Modal -->
    <div id="import-modal" class="hidden fixed inset-0 z-[9999] bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="modal-enter bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-full">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center shrink-0">
                <h3 class="text-lg font-bold text-slate-800">匯入施工狀態資訊</h3>
                <button id="close-modal-btn" class="text-slate-400 hover:text-slate-600 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto">
                <p class="text-sm text-slate-600 mb-3 leading-relaxed">請貼上施工資料，一列一筆平交道，格式以逗號分隔：<br>
                <code class="bg-slate-100 text-pink-600 px-1.5 py-0.5 rounded font-mono text-xs">編號,施工日期,施工數量,施工狀態</code><br>
                範例：<br>
                <code class="bg-slate-100 text-pink-600 px-1.5 py-0.5 rounded font-mono text-xs">416,115/04/08,1,已施工</code></p>
                <textarea id="import-textarea" rows="8" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm font-mono placeholder-slate-400 shadow-inner" placeholder="416,115/04/08,1,已施工&#10;417,115/04/09,2,未施工"></textarea>
            </div>
            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3 shrink-0">
                <button id="cancel-import-btn" class="px-4 py-2 text-slate-600 hover:bg-slate-200 bg-slate-100 rounded-lg font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-slate-300">取消</button>
                <button id="confirm-import-btn" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">確認匯入</button>
            </div>
        </div>
    </div>

    <!-- 車站/電務段/分駐所 詳情 Modal -->
    <div id="entity-modal" class="hidden fixed inset-0 z-[9999] bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="modal-enter bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden flex flex-col max-h-full">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <span id="entity-badge" class="px-2.5 py-1 rounded-full text-xs font-bold"></span>
                    <h3 id="entity-title" class="text-lg font-bold text-slate-800">單位資訊</h3>
                </div>
                <button id="close-entity-modal-btn" class="text-slate-400 hover:text-slate-600 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-4 overflow-y-auto text-sm text-slate-600">
                <div class="space-y-1 bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <p class="text-xs font-semibold text-slate-400">🏢 名稱</p>
                    <p id="entity-detail-name" class="text-base font-bold text-slate-800"></p>
                </div>
                <div class="space-y-1 bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <p class="text-xs font-semibold text-slate-400">📍 地址</p>
                    <p id="entity-detail-address" class="text-slate-800 font-medium"></p>
                </div>
                <div class="space-y-1 bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <p class="text-xs font-semibold text-slate-400">📞 聯絡電話</p>
                    <a id="entity-detail-phone-link" href="#" class="text-indigo-600 hover:underline font-semibold block text-base"></a>
                </div>
            </div>
            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex flex-col sm:flex-row gap-2 shrink-0">
                <a id="entity-nav-btn" href="#" target="_blank" class="flex-1 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors text-center shadow-sm flex items-center justify-center gap-1.5">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0z" /></svg>
                    地圖導航
                </a>
                <button id="entity-filter-btn" class="flex-1 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-medium transition-colors text-center shadow-sm flex items-center justify-center gap-1.5">
                    🔍 篩選平交道
                </button>
                <button id="close-entity-action-btn" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium transition-colors">
                    關閉
                </button>
            </div>
        </div>
    </div>

    <!-- 置頂按鈕 -->
    <div id="scroll-to-top-btn" class="scroll-to-top">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18" />
        </svg>
    </div>

    <script>
        // 全域單位組織資料庫 (將從 org_data.json 非同步載入)
        let orgDatabase = {
            stations: {},
            electric_sections: {},
            divisions: {}
        };

        // 全域變數
        let fullCrossingData = [];
        let filteredData = [];
        let debounceTimer;
        let map = null;
        let markersGroup = null;
        let legendControl = null;
        let isMapView = false;
        let userLocation = null;
        let isNearbyActive = false;
        let isConstructionActive = false;
        let stationFilterOverride = null; // 點選車站後的平交道專屬篩選器
        const NEARBY_RADIUS_KM = 15;

        // 監控 filter-bar 高度
        const filterBarElement = document.getElementById('filter-bar');
        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                document.documentElement.style.setProperty('--filter-height', `${entry.borderBoxSize[0].blockSize}px`);
                if (map && isMapView) {
                    setTimeout(() => map.invalidateSize(), 50);
                }
            }
        });
        resizeObserver.observe(filterBarElement);

        const colorPalette = [
            '#e6194b', '#3cb44b', '#4363d8', '#f58231', '#911eb4', 
            '#46f0f0', '#f032e6', '#bcf60c', '#fabebe', '#008080', 
            '#e6beff', '#9a6324', '#ffd8b1', '#800000', '#aaffc3', 
            '#808000', '#ffd8b1', '#000075', '#808080', '#000000'
        ];

        const stationColors = {};
        let colorIndex = 0;
        function getStationColor(station) {
            if (isUnknownValue(station)) return '#94a3b8';
            if (!stationColors[station]) {
                stationColors[station] = colorPalette[colorIndex % colorPalette.length];
                colorIndex++;
            }
            return stationColors[station];
        }

        const sectionColors = {};
        let sectionColorIndex = 0;
        function getElectricSectionColor(section) {
            if (isUnknownValue(section)) return '#94a3b8';
            if (!sectionColors[section]) {
                sectionColors[section] = colorPalette[sectionColorIndex % colorPalette.length];
                sectionColorIndex++;
            }
            return sectionColors[section];
        }

        const searchInput = document.getElementById('search-input');
        const electricSectionFilter = document.getElementById('electric-section-filter');
        const cityFilter = document.getElementById('city-filter');
        const stationFilter = document.getElementById('station-filter');
        const sectionFilter = document.getElementById('section-filter');
        const lineFilter = document.getElementById('line-filter');
        const resultsContainer = document.getElementById('results-container');
        const mapWrapper = document.getElementById('map-wrapper');
        const mapNoResults = document.getElementById('map-no-results');
        const loadingMessage = document.getElementById('loading-message');
        const noResultsMessage = document.getElementById('no-results-message');
        const resultsCountElement = document.getElementById('results-count');
        const scrollToTopBtn = document.getElementById('scroll-to-top-btn');
        const toggleViewBtn = document.getElementById('toggle-view-btn');
        const toggleViewText = document.getElementById('toggle-view-text');
        const nearbyBtn = document.getElementById('nearby-btn');
        const constructionBtn = document.getElementById('construction-btn');
        const recenterBtn = document.getElementById('recenter-btn');

        // Modal 元素
        const importModal = document.getElementById('import-modal');

        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function isUnknownValue(value) {
            return value === '' || value === 0 || value === '0' || value === undefined || value === null || value === '不明';

                        <div>
                            <div class="flex items-center flex-wrap gap-y-1">
                                <h2 class="text-lg sm:text-xl font-bold text-indigo-600 leading-tight">${item['平交道名稱']}${item['舊名或別名'] ? `<span class="text-slate-500 text-sm font-normal ml-1">(${item['舊名或別名']})</span>` : ''}</h2>
                                ${item.distance !== undefined && item.distance !== 9999 ? `<span class="bg-green-100 text-green-700 border border-green-200 text-xs font-bold px-2.5 py-0.5 rounded-md ml-2">距 ${item.distance.toFixed(1)} km</span>` : ''}
                                ${constructionBadge}
                                ${isDeactivated ? `<span class="bg-red-100 text-red-600 border border-red-200 text-xs font-bold px-2.5 py-0.5 rounded-md ml-2">停用</span>` : ''}
                            </div>
                            <p class="text-xs text-slate-400 mt-1 font-mono">ID: ${item['編號']} | ${item['里程']}</p>
                        </div>
                    </div>
                    <div class="space-y-2 text-sm text-slate-600 bg-slate-50 rounded-lg p-3 border border-slate-100">
                        <div class="flex items-start"><span class="font-semibold text-slate-400 min-w-[3.5rem]">位置</span><span class="text-slate-800 font-medium">${getDisplayValue(item['所在縣市'])} ${startStBadge} ⇄ ${endStBadge})</span></div>
                        <div class="flex items-start"><span class="font-semibold text-slate-400 min-w-[3.5rem]">路線</span><span class="text-slate-800">${getDisplayValue(item['路線別'])} <span class="text-xs text-slate-500 bg-slate-200 px-1.5 py-0.5 rounded ml-1">${getDisplayValue(item['平交道種類'])}</span></span></div>
                        <div class="flex items-center"><span class="font-semibold text-slate-400 min-w-[3.5rem]">單位</span><span class="flex flex-wrap gap-1.5">${electricText}  /  ${divisionText}分駐所</span></div>
                        ${constructInfoHtml}
                    </div>
                    <div class="mt-4 flex items-center justify-between">
                        ${hasLoc ? `<div class="flex items-center gap-2">
                            <a href="${navUrl}" target="_blank" class="inline-flex items-center space-x-1 text-white bg-indigo-600 hover:bg-indigo-700 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0z" /></svg><span>導航</span>
                            </a>
                            <a href="${streetViewUrl}" target="_blank" class="inline-flex items-center space-x-1 text-slate-600 hover:text-slate-800 transition-colors bg-slate-100 hover:bg-slate-200 border border-slate-200 px-3 py-1.5 rounded-lg text-sm font-medium">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg><span>街景</span>
                            </a>
                        </div>` : `<span class="text-sm text-slate-400 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100">無座標資料</span>`}
                        <button class="share-btn inline-flex items-center space-x-1.5 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors border border-transparent hover:border-indigo-100" data-item='${JSON.stringify(item).replace(/'/g, "&#39;")}' onclick="handleShare(this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" /></svg><span>分享</span>
                        </button>
                    </div>
                `;
                resultsContainer.appendChild(card);
            });
        }

        function populateFilter(selectElement, data, key, defaultLabel) {
            const currentValue = selectElement.value;
            selectElement.innerHTML = `<option value="">${defaultLabel} (全部)</option>`;
            const uniqueValues = new Set();
            data.forEach(item => { if (!isUnknownValue(item[key])) uniqueValues.add(item[key]); });

            Array.from(uniqueValues).sort().forEach(v => {
                const opt = document.createElement('option'); opt.value = v; opt.textContent = v;
                selectElement.appendChild(opt);
            });
            if (currentValue) selectElement.value = currentValue;
        }

        function filterAndRender(autoScroll = false) {
            const s = searchInput.value.toLowerCase(), es = electricSectionFilter.value, ci = cityFilter.value, st = stationFilter.value, se = sectionFilter.value, li = lineFilter.value;

            let temp = fullCrossingData.filter(i => {
                const nm = i['平交道名稱'].toLowerCase().includes(s) || (i['舊名或別名'] && i['舊名或別名'].toLowerCase().includes(s));
                let match = nm && (!es || getDisplayValue(i['電務段']) === es) && (!st || getDisplayValue(i['分駐所']) === st) && (!ci || getDisplayValue(i['所在縣市']) === ci) && (!se || getDisplayValue(i['區間']) === se) && (!li || getDisplayValue(i['路線別']) === li);
                
                // 車站特殊關聯交叉篩選 (區間起點或迄點相符者)
                if (stationFilterOverride) {
                    if (getDisplayValue(i['區間起']) !== stationFilterOverride && getDisplayValue(i['區間迄']) !== stationFilterOverride) {
                        match = false;
                    }
                }
                
                if (isConstructionActive && !i.isProjectSite) match = false;
                
                return match;
            });

            if (userLocation) {
                temp.forEach(i => {
                    let lt = i['緯度'], lg = i['經度'];
                    i.distance = (lt && !isNaN(lt)) ? getDistanceFromLatLonInKm(userLocation.lat, userLocation.lng, parseFloat(lt), parseFloat(lg)) : 9999;
                });
                if (isNearbyActive) temp = temp.filter(i => i.distance <= NEARBY_RADIUS_KM);
                temp.sort((a, b) => a.distance - b.distance);
            }
            filteredData = temp;
            renderCrossings(filteredData);
            if (map) updateMapMarkers();
            
            if(filteredData.length === 0) {
                if (isMapView) mapNoResults.classList.remove('hidden'); else noResultsMessage.classList.remove('hidden');
            } else {
                noResultsMessage.classList.add('hidden'); mapNoResults.classList.add('hidden');
            }

            // 更新篩選標籤
            updateActiveFiltersUI();

            // 連動篩選邏輯，計算當前條件下的其它欄位候選項
            const cond = (i) => ({ 
                electric: !es || getDisplayValue(i['電務段']) === es, 
                station: !st || getDisplayValue(i['分駐所']) === st, 
                city: !ci || getDisplayValue(i['所在縣市']) === ci, 
                section: !se || getDisplayValue(i['區間']) === se, 
                line: !li || getDisplayValue(i['路線別']) === li 
            });

            populateFilter(electricSectionFilter, fullCrossingData.filter(i => { const c = cond(i); return c.city && c.station && c.section && c.line; }), '電務段', '電務段');
            populateFilter(stationFilter, fullCrossingData.filter(i => { const c = cond(i); return c.electric && c.city && c.section && c.line; }), '分駐所', '分駐所');
            populateFilter(cityFilter, fullCrossingData.filter(i => { const c = cond(i); return c.electric && c.station && c.section && c.line; }), '所在縣市', '縣市');
            populateFilter(sectionFilter, fullCrossingData.filter(i => { const c = cond(i); return c.electric && c.station && c.city && c.line; }), '區間', '區間');
            populateFilter(lineFilter, fullCrossingData.filter(i => { const c = cond(i); return c.electric && c.station && c.city && c.section; }), '路線別', '路線');

            if (autoScroll && !isMapView) scrollToTop();
        }

        // 動態生成與移除主動式 Filter 標籤
        function updateActiveFiltersUI() {
            const container = document.getElementById('active-filters');
            const clearBtn = document.getElementById('clear-filters-btn');
            container.innerHTML = '';
            
            let activeCount = 0;
            
            if (stationFilterOverride) {
                activeCount++;
                createFilterBadge(container, `關聯車站: ${stationFilterOverride}`, () => {
                    stationFilterOverride = null;
                    filterAndRender(true);
                });
            }
            if (electricSectionFilter.value) {
                activeCount++;
                createFilterBadge(container, `電務段: ${electricSectionFilter.value}`, () => {
                    electricSectionFilter.value = '';
                    filterAndRender(true);
                });
            }
            if (stationFilter.value) {
                activeCount++;
                createFilterBadge(container, `分駐所: ${stationFilter.value}`, () => {
                    stationFilter.value = '';
                    filterAndRender(true);
                });
            }
            if (cityFilter.value) {
                activeCount++;
                createFilterBadge(container, `縣市: ${cityFilter.value}`, () => {
                    cityFilter.value = '';
                    filterAndRender(true);
                });
            }
            if (sectionFilter.value) {
                activeCount++;
                createFilterBadge(container, `區間: ${sectionFilter.value}`, () => {
                    sectionFilter.value = '';
                    filterAndRender(true);
                });
            }
            if (lineFilter.value) {
                activeCount++;
                createFilterBadge(container, `路線: ${lineFilter.value}`, () => {
                    lineFilter.value = '';
                    filterAndRender(true);
                });
            }
            if (searchInput.value) {
                activeCount++;
                createFilterBadge(container, `關鍵字: "${searchInput.value}"`, () => {
                    searchInput.value = '';
                    filterAndRender(true);
                });
            }
            
            if (activeCount > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }
        }
        
        function createFilterBadge(parent, text, onRemove) {
            const badge = document.createElement('span');
            badge.className = 'inline-flex items-center gap-1.5 bg-indigo-50 border border-indigo-200 text-indigo-700 text-xs font-bold px-2.5 py-1 rounded-full shadow-sm';
            badge.innerHTML = `
                <span>${text}</span>
                <button class="hover:text-red-600 focus:outline-none ml-1 text-slate-400 font-black" style="font-size: 10px;">✕</button>
            `;
            badge.querySelector('button').addEventListener('click', onRemove);
            parent.appendChild(badge);
        }

        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        
        searchInput.addEventListener('input', () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => filterAndRender(true), 400); });
        
        // 綁定下拉選單變更事件
        [electricSectionFilter, cityFilter, stationFilter, sectionFilter, lineFilter].forEach(el => el.addEventListener('change', () => {
            stationFilterOverride = null; // 手動切換下拉選單時自動移除車站篩選覆蓋
            filterAndRender(true);
        }));

        document.getElementById('clear-filters-btn').addEventListener('click', () => {
            searchInput.value = '';
            electricSectionFilter.value = '';
            cityFilter.value = '';
            stationFilter.value = '';
            sectionFilter.value = '';
            lineFilter.value = '';
            stationFilterOverride = null;
            filterAndRender(true);
        });
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollToTopBtn.classList.add('show');
            } else {
                scrollToTopBtn.classList.remove('show');
            }
        });

        scrollToTopBtn.addEventListener('click', scrollToTop);

        // 施工資料匯入 Modal 相關操作
        function openImportModal() {
            importModal.classList.remove('hidden');
            setTimeout(() => importTextarea.focus(), 50);
        }

        function closeImportModal() {
            importModal.classList.add('hidden');
        }

        importDataBtn.addEventListener('click', openImportModal);
        closeModalBtn.addEventListener('click', closeModalBtn);
        cancelImportBtn.addEventListener('click', closeImportModal);
        importModal.addEventListener('click', (e) => {
            if (e.target === importModal) closeImportModal();
        });

        // 轉換 Excel 序列日期 (如 46120) 為民國年格式
        function formatExcelDate(dateStr) {
            if (!dateStr) return '';
            if (/^\d+$/.test(dateStr)) {
                const serial = parseInt(dateStr, 10);
                if (serial > 59) {
                    const utcDays = serial - 25569;
                    const dateInfo = new Date(utcDays * 86400 * 1000);
                    if (!isNaN(dateInfo.getTime())) {
                        const year = dateInfo.getUTCFullYear();
                        const month = String(dateInfo.getUTCMonth() + 1).padStart(2, '0');
                        const day = String(dateInfo.getUTCDate()).padStart(2, '0');
                        return `${year - 1911}/${month}/${day}`;
                    }
                }
            }
            return dateStr;
        }

        // 處理施工資料匯入邏輯
        confirmImportBtn.addEventListener('click', () => {
            const text = importTextarea.value.trim();
            if (!text) {
                showToast('請貼上有效格式之資料！', true);
                return;
            }

            const lines = text.split('\n');
            const constructMap = {};
            let validCount = 0;

            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length >= 1) {
                    const id = parts[0].trim();
                    if (id) {
                        constructMap[id] = {
                            '施工日期': formatExcelDate(parts[1] ? parts[1].trim() : ''),
                            '施工數量': parts[2] ? parts[2].trim() : '',
                            '施工狀態': parts[3] ? parts[3].trim() : ''
                        };
                        validCount++;
                    }
                }
            });

            if (validCount === 0) {
                showToast('找不到符合格式之資料', true);
                return;
            }

            // 更新主平交道資料集合
            fullCrossingData.forEach(item => {
                const id = String(item['編號']);
                if (constructMap[id]) {
                    item.isProjectSite = true;
                    item['施工日期'] = constructMap[id]['施工日期'];
                    item['施工數量'] = constructMap[id]['施工數量'];
                    item['施工狀態'] = constructMap[id]['施工狀態'];
                } else {
                    item.isProjectSite = false;
                    delete item['施工日期'];
                    delete item['施工數量'];
                    delete item['施工狀態'];
                }
            });

            // 更新 UI 狀態
            constructionBtn.classList.remove('hidden');
            projectSubtitle.textContent = `已載入 ${validCount} 筆專案資料`;
            projectSubtitle.classList.remove('hidden');
            
            closeImportModal();
            importTextarea.value = '';
            showToast(`✅ 成功匯入 ${validCount} 筆施工狀態資料！`);
            
            filterAndRender(false);
        });

        // 頁面初次載入資源
        window.addEventListener('load', () => {
            // 1. 非同步載入組織單位資料，並包含嚴密的錯誤防護機制
            fetch('org_data.json')
                .then(r => {
                    if (!r.ok) throw new Error('無法讀取 org_data.json');
                    return r.json();
                })
                .then(orgData => {
                    // 導入讀取的資料
                    orgDatabase.stations = orgData.stations || {};
                    orgDatabase.electric_sections = orgData.electric_sections || {};
                    orgDatabase.divisions = orgData.divisions || {};
                })
                .catch(err => {
                    console.warn('⚠️ 單位資料庫 org_data.json 載入失敗或不存在，系統已自動啟用智慧 Fallback 防護機制。', err);
                    // 確保全域變數不會是 undefined 導致系統崩潰
                    orgDatabase = { stations: {}, electric_sections: {}, divisions: {} };
                })
                .finally(() => {
                    // 2. 載入主要平交道資料
                    fetch('evelcrossing.json')
                        .then(r => r.json())
                        .then(mainData => {
                            mainData.forEach(item => {
                                item.isProjectSite = false;
                                delete item['施工狀態'];
                                delete item['施工日期'];
                                delete item['施工數量'];
                            });

                            fullCrossingData = mainData;
                            loadingMessage.classList.add('hidden'); 
                            filterAndRender(false); 
                        })
                        .catch(() => { 
                            loadingMessage.innerHTML = '<p class="text-red-500">平交道資料載入失敗，請確認 evelcrossing.json 正確上傳。</p>'; 
                        });
                });
        });

        // 分享與複製功能 (Windows 優先採用剪貼簿複製)
        window.handleShare = function(btn) {
            try {
                const itemData = JSON.parse(btn.getAttribute('data-item'));
                const name = itemData['平交道名稱'] || '未知平交道';
                const id = itemData['編號'] || '';
                const loc = getDisplayValue(itemData['所在縣市']) + ' / ' + getDisplayValue(itemData['區間']);
                let lat = itemData['緯度'];
                let lng = itemData['經度'];
                
                let mapUrl = '';
                if (lat && lng && !isNaN(lat) && !isNaN(lng)) {
                    mapUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
                }
                
                const shareTitle = `平交道資訊：${name}`;
                const shareText = `📍 ${name} (ID: ${id})\n🗺️ 位置：${loc}${mapUrl ? '\n🔗 Google 地圖：' + mapUrl : ''}`;

                const isWindows = /Windows/i.test(navigator.userAgent);

                if (!isWindows && navigator.share) {
                    navigator.share({
                        title: shareTitle,
                        text: shareText,
                    }).catch(err => {
                        if (err.name !== 'AbortError') fallbackCopyTextToClipboard(shareText);
                    });
                } else {
                    fallbackCopyTextToClipboard(shareText);
                }
            } catch (e) {
                console.error("分享發生錯誤:", e);
                showToast('❌ 發生錯誤', true);
            }
        };

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast('✅ 成功複製平交道資訊至剪貼簿！');
                } else {
                    showToast('❌ 複製失敗', true);
                }
            } catch (err) {
                showToast('❌ 發生錯誤', true);
            }
            document.body.removeChild(textArea);
        }

        function showToast(msg, isError = false) {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'fixed bottom-24 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm';
                document.body.appendChild(container);
            }
            
            const toast = document.createElement('div');
            toast.className = `px-4 py-3 rounded-xl shadow-lg text-sm font-bold text-center text-white toast-enter ${isError ? 'bg-red-500' : 'bg-slate-800/90 backdrop-blur'}`;
            toast.textContent = msg;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-leave');
                setTimeout(() => {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 300);
            }, 2500);
        }
    </script>
</body>
