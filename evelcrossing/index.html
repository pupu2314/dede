<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平交道資訊查詢</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #1a202c;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* 隱藏捲動條 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 置頂篩選器基礎樣式 */
        .filter-wrapper {
            position: sticky;
            top: 0;
            z-index: 40;
            transition: background-color 0.2s;
        }

        /* 精簡模式：背景變深並縮減內距 */
        .filter-wrapper.compact-mode {
            background-color: rgba(26, 32, 44, 0.98);
            border-bottom: 1px solid #4a5568;
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
        }

        .filter-card {
            background-color: #2d3748;
            border: 1px solid #4a5568;
            border-radius: 0.75rem;
            padding: 1rem;
            transition: all 0.2s;
        }

        /* 精簡模式下的卡片外觀調整 */
        .filter-wrapper.compact-mode .filter-card {
            background-color: transparent;
            border-color: transparent;
            padding: 0;
            border-radius: 0;
        }

        /* 標籤顯示切換 */
        .filter-label { transition: opacity 0.2s; }
        .filter-wrapper.compact-mode .filter-label {
            display: none;
        }

        /* 佈局切換：一般模式為 Grid，精簡模式為 Flex 橫排 */
        .filter-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }
        @media (min-width: 1024px) {
            .filter-layout { grid-template-columns: 2fr repeat(5, 1fr); }
        }

        .filter-wrapper.compact-mode .filter-layout {
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            gap: 0.5rem;
            align-items: center;
        }

        /* 輸入框尺寸 */
        .filter-input {
            height: 2.75rem;
            background-color: #1f2937;
            border: 1px solid #4a5568;
            border-radius: 0.5rem;
            padding: 0 0.75rem;
            width: 100%;
        }
        .filter-wrapper.compact-mode .filter-input {
            height: 2.25rem;
            font-size: 0.875rem;
            min-width: 120px;
            flex: 0 0 auto;
        }
        .filter-wrapper.compact-mode .search-input-box {
            min-width: 180px;
        }

        /* 計數區塊在精簡模式隱藏 */
        .filter-info-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem; }
        .filter-wrapper.compact-mode .filter-info-row { display: none; }

        /* 目前條件標籤列 */
        .active-tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        .filter-wrapper.compact-mode .active-tags-row {
            margin-top: 0.5rem;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 2px;
        }

        .tag-badge {
            background: #4a5568;
            padding: 0.25rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            white-space: nowrap;
            cursor: pointer;
        }

        /* 卡片內容優化 */
        .item-card {
            background: #2d3748;
            border: 1px solid #4a5568;
            border-radius: 1rem;
            padding: 1.25rem;
            transition: transform 0.2s;
        }
        .item-card:hover { transform: translateY(-2px); border-color: #6366f1; }

        .scroll-top {
            position: fixed;
            bottom: 5rem;
            right: 1.5rem;
            background: #6366f1;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
        }
        .scroll-top.show { opacity: 1; }
    </style>
</head>
<body class="pb-16">

    <div class="max-w-7xl mx-auto px-4 pt-6 pb-4">
        <h1 class="text-3xl font-bold text-center bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-pink-400">
            平交道資訊查詢
        </h1>
    </div>

    <!-- 滾動參考點 -->
    <div id="top-marker"></div>

    <div id="sticky-header" class="filter-wrapper px-4">
        <div class="max-w-7xl mx-auto">
            <div class="filter-card">
                <!-- 第一列：條件設定 -->
                <div class="filter-layout hide-scrollbar">
                    <div class="search-input-box">
                        <label class="filter-label text-xs text-gray-400 mb-1 block">搜尋名稱</label>
                        <input type="text" id="search-input" placeholder="搜尋平交道..." class="filter-input focus:ring-1 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="filter-label text-xs text-gray-400 mb-1 block">電務段</label>
                        <select id="electric-filter" class="filter-input outline-none"><option value="">全部電務段</option></select>
                    </div>
                    <div>
                        <label class="filter-label text-xs text-gray-400 mb-1 block">分駐所</label>
                        <select id="station-filter" class="filter-input outline-none"><option value="">全部分駐所</option></select>
                    </div>
                    <div>
                        <label class="filter-label text-xs text-gray-400 mb-1 block">縣市</label>
                        <select id="city-filter" class="filter-input outline-none"><option value="">全部縣市</option></select>
                    </div>
                    <div>
                        <label class="filter-label text-xs text-gray-400 mb-1 block">區間</label>
                        <select id="section-filter" class="filter-input outline-none"><option value="">全部區間</option></select>
                    </div>
                    <div>
                        <label class="filter-label text-xs text-gray-400 mb-1 block">路線</label>
                        <select id="line-filter" class="filter-input outline-none"><option value="">全部路線</option></select>
                    </div>
                </div>

                <!-- 第二列：目前條件與計數 -->
                <div id="tags-container" class="active-tags-row hide-scrollbar"></div>
                
                <div class="filter-info-row">
                    <span id="result-count" class="text-xs text-gray-400">載入中...</span>
                    <button id="reset-btn" class="text-xs text-red-400 hover:underline hidden">清除篩選</button>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 mt-6">
        <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        <div id="empty-state" class="hidden text-center py-20 text-gray-500">查無符合條件的資料</div>
    </main>

    <div id="scroll-btn" class="scroll-top">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
    </div>

    <script>
        let allData = [];
        let isCompact = false;
        const header = document.getElementById('sticky-header');
        const marker = document.getElementById('top-marker');

        // 監聽滾動切換精簡模式
        window.addEventListener('scroll', () => {
            const shouldBeCompact = window.scrollY > marker.offsetTop + 20;
            if (shouldBeCompact !== isCompact) {
                isCompact = shouldBeCompact;
                header.classList.toggle('compact-mode', isCompact);
                renderTags(); // 重新渲染標籤以適應精簡模式
            }
            
            const scrollBtn = document.getElementById('scroll-btn');
            if (window.scrollY > 400) scrollBtn.classList.add('show');
            else scrollBtn.classList.remove('show');
        });

        document.getElementById('scroll-btn').onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});

        // 初始化篩選器選單
        function initSelects() {
            const fields = {
                'electric-filter': '電務段',
                'station-filter': '分駐所',
                'city-filter': '所在縣市',
                'section-filter': '區間',
                'line-filter': '路線別'
            };

            Object.entries(fields).forEach(([id, key]) => {
                const select = document.getElementById(id);
                const values = [...new Set(allData.map(item => item[key]))].filter(Boolean).sort();
                values.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v;
                    opt.textContent = v;
                    select.appendChild(opt);
                });
                select.onchange = () => filterAndRender(true);
            });

            document.getElementById('search-input').oninput = () => filterAndRender(true);
            document.getElementById('reset-btn').onclick = resetFilters;
        }

        function resetFilters() {
            document.querySelectorAll('.filter-input').forEach(i => i.value = '');
            filterAndRender(false);
        }

        function filterAndRender(shouldScrollBack = false) {
            const search = document.getElementById('search-input').value.toLowerCase();
            const electric = document.getElementById('electric-filter').value;
            const station = document.getElementById('station-filter').value;
            const city = document.getElementById('city-filter').value;
            const section = document.getElementById('section-filter').value;
            const line = document.getElementById('line-filter').value;

            const filtered = allData.filter(item => {
                return (!search || item['平交道名稱'].toLowerCase().includes(search)) &&
                       (!electric || item['電務段'] === electric) &&
                       (!station || item['分駐所'] === station) &&
                       (!city || item['所在縣市'] === city) &&
                       (!section || item['區間'] === section) &&
                       (!line || item['路線別'] === line);
            });

            renderGrid(filtered);
            renderTags();
            document.getElementById('result-count').textContent = `共 ${filtered.length} 筆資料`;
            document.getElementById('reset-btn').classList.toggle('hidden', filtered.length === allData.length);

            // 若在精簡模式下變更條件，回到第一筆資料
            if (shouldScrollBack && isCompact) {
                window.scrollTo({ top: marker.offsetTop + 10, behavior: 'smooth' });
            }
        }

        function renderGrid(data) {
            const container = document.getElementById('results-grid');
            const empty = document.getElementById('empty-state');
            container.innerHTML = '';
            
            if (data.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-indigo-300 text-lg">${item['平交道名稱']}</h3>
                        <span class="text-xs text-gray-500">${item['編號']}</span>
                    </div>
                    <div class="space-y-1 text-sm text-gray-400">
                        <p>📍 ${item['所在縣市']} / ${item['區間']}間</p>
                        <p>🚂 ${item['路線別']} (${item['平交道種類']})</p>
                        <p>🏢 ${item['電務段']}段 / ${item['分駐所']}</p>
                    </div>
                    ${item['Google地圖'] ? `
                        <a href="${item['Google地圖']}" target="_blank" class="mt-3 inline-block text-xs text-indigo-400 hover:text-indigo-300">
                            查看 Google 地圖 →
                        </a>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        function renderTags() {
            const container = document.getElementById('tags-container');
            container.innerHTML = '';

            const active = [];
            const inputs = {
                '搜尋': 'search-input',
                '段': 'electric-filter',
                '所': 'station-filter',
                '市': 'city-filter',
                '區': 'section-filter',
                '線': 'line-filter'
            };

            // 如果是精簡模式且有篩選，最前面放一個清除鈕
            const hasAnyFilter = Object.values(inputs).some(id => document.getElementById(id).value !== '');
            if (isCompact && hasAnyFilter) {
                const clearTag = document.createElement('div');
                clearTag.className = 'tag-badge bg-red-900/40 text-red-300 border border-red-500/30';
                clearTag.innerHTML = '✕ 清除全部';
                clearTag.onclick = resetFilters;
                container.appendChild(clearTag);
            }

            Object.entries(inputs).forEach(([label, id]) => {
                const val = document.getElementById(id).value;
                if (val) {
                    const tag = document.createElement('div');
                    tag.className = 'tag-badge border border-gray-600 shrink-0';
                    tag.innerHTML = `${label}: ${val} <span class="text-gray-500 ml-1">×</span>`;
                    tag.onclick = () => {
                        document.getElementById(id).value = '';
                        filterAndRender(true);
                    };
                    container.appendChild(tag);
                }
            });
        }

        // 載入資料
        fetch('evelcrossing.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                initSelects();
                filterAndRender();
            })
            .catch(err => {
                document.getElementById('result-count').textContent = '資料載入錯誤';
                console.error(err);
            });
    </script>
</body>
</html>
