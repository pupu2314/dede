<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007bff">
    <link rel="manifest" href="manifest.json">
    <title>德德美體美容中心</title>
    <link rel="stylesheet" href="dede.css">
</head>
<body>

<!-- 吐司通知容器 -->
<div id="toast-notification" class="toast-notification" role="alert" aria-live="assertive"></div>

<!-- 應用程式主要內容 (設定為截圖範圍) -->
<main class="container" id="capture-area">
    <header>
        <h2 style="text-align: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; color: #0056b3; margin-top: 0;"><img src="dede.png" crossorigin="anonymous" style="max-width: 100%; height: auto;"></h2>
    </header>

    <!-- 快速操作區 -->
    <fieldset aria-labelledby="quick-actions">
        <legend id="quick-actions">快速操作</legend>
        <div class="header-actions">
             <button id="save-btn" class="btn" title="儲存當前選擇">💾 儲存</button>
             <button id="load-btn" class="btn" title="載入上次選擇">📂 讀取</button>
             <button id="clear-btn" class="btn" title="清除所有選項">🗑️ 清除</button>
             <button id="share-link-btn" class="btn" title="產生分享網址並複製">🔗 分享</button>
             <button id="screenshot-btn" class="btn" title="輸出為圖片">📷 截圖</button>
        </div>
    </fieldset>

    <!-- 搜尋區塊 -->
    <div class="search-container">
        <label for="search-input" class="sr-only">搜尋服務項目</label>
        <input type="search" id="search-input" placeholder="🔍 輸入名稱或標籤 (可用逗號分隔多個)...">
    </div>

    <!-- 載入中提示 -->
    <div id="loading-indicator" style="text-align: center; padding: 40px; color: var(--text-muted, #6c757d);">
        <p>⏳ 正在載入服務項目資料...</p>
    </div>

    <!-- 服務項目列表渲染容器 -->
    <div id="service-list"></div>

    <!-- 懸浮視窗區域：包含總計與明細 -->
    <div id="summary-details">
        <!-- 結算總計 (置於懸浮窗頂部，依序排列) -->
        <div id="summary-details">
        <div class="final-totals" style="border-bottom: 2px solid #eee; padding-bottom: 8px; margin-bottom: 8px; text-align: right; font-size: 0.95em; line-height: 1.4;">
            <p id="original-total-p" style="margin: 2px 0;">總原價：<span id="floating-original-total">0</span> 元</p>
            
            <p id="promo-savings-container" style="margin: 2px 0; display: none;">
                <span style="color: #dc3545;">套用優惠：<span id="floating-applied-promo">無</span></span>
                <span style="color: #28a745; margin-left: 8px;">(共省下：<span id="floating-savings">0</span> 元)</span>
            </p>
            
            <p id="discounted-total-p" style="margin: 2px 0; font-weight: bold; font-size: 1.1em;">折扣後總金額：<span id="floating-discounted-total">0</span> 元</p>
            
            <div id="points-container" style="display: none; color: var(--primary-color, #007bff); font-weight: bold; margin-top: 5px;">
              <span>🎁 可獲得點數：<span id="floating-points">0</span> 點</span>
            </div>
        </div>

        <details class="details-content">
            <summary style="font-weight: bold; cursor: pointer; padding: 5px 0; color: #007bff; outline: none;">🛒 目前選擇明細 (點擊展開)</summary>
            <div id="floating-selected-items-list" style="margin-top: 5px; font-size: 0.9em; max-height: 20vh; overflow-y: auto;">
                <ul style="padding: 0; margin: 0; list-style: none;"></ul>
            </div>
        </details>
    </div>
</main>

<!-- 引用 html2canvas 函式庫以支援截圖功能 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- 引入主要的應用程式邏輯 -->
<script src="app.js"></script>
<script>
    // PWA: 註冊 Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js', { scope: './' })
                .then(reg => console.log('Service Worker registered', reg))
                .catch(err => console.error('Service Worker registration failed', err));
        });
    }
</script>
</body>
</html>
